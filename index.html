/* ---------------- CLIP ---------------- */
const BEAT_MS=5200;
function Clip({lesson, active, state, mutateEng, onComplete, flash, setSheet, scrollNext}){
  const [beat,setBeat]=useState(0);
  const [playing,setPlaying]=useState(false);
  const [prog,setProg]=useState(0);
  const [showQuiz,setShowQuiz]=useState(false);
  const [picked,setPicked]=useState(null);
  const e=state.eng[lesson.id]||blankEng();
  const watchAccum=useRef(0); const enteredOnce=useRef(false); const completedRef=useRef(false);
  const flushWatch=()=>{ if(watchAccum.current>0){ const ms=watchAccum.current; watchAccum.current=0; mutateEng(lesson.id, prev=>({...prev, watchMs:prev.watchMs+ms})); } };
  useEffect(()=>{
    if(active){
      if(!enteredOnce.current){ enteredOnce.current=true; mutateEng(lesson.id, prev=>({...prev, views:prev.views+1, rewatches: prev.views>0?prev.rewatches+1:prev.rewatches})); }
      setBeat(0); setProg(0); setShowQuiz(false); setPicked(null); completedRef.current=false; setPlaying(true);
    } else { flushWatch(); if(enteredOnce.current && !completedRef.current) mutateEng(lesson.id, prev=>({...prev, skipped:prev.skipped+1})); enteredOnce.current=false; setPlaying(false); }
  },[active]);
  useEffect(()=>{ if(!active||!playing||showQuiz) return; const tick=120;
    const t=setInterval(()=>{ watchAccum.current+=tick;
      setProg(p=>{ const np=p+tick/BEAT_MS;
        if(np>=1){ setBeat(b=>{ if(b+1>=lesson.beats.length){ completedRef.current=true; flushWatch(); setShowQuiz(true); setPlaying(false); mutateEng(lesson.id, prev=>({...prev, completed:prev.completed+1})); onComplete(lesson.id); return b; } return b+1; }); return 0; }
        return np; });
    },tick); return ()=>{ clearInterval(t); flushWatch(); };
  },[active,playing,showQuiz,beat]);
  useEffect(()=>{ const t=setInterval(flushWatch,3000); return ()=>clearInterval(t); },[]);
  const liked=e.liked, saved=e.saved;
  const likeCount=lesson.baseLikes+(liked?1:0), saveCount=lesson.baseSaves+(saved?1:0);
  const toggleLike=()=>{ mutateEng(lesson.id, prev=>({...prev, liked:!prev.liked})); if(!liked) flash("Liked — noted as a favourite ❤️"); };
  const toggleSave=()=>{ mutateEng(lesson.id, prev=>({...prev, saved:!prev.saved})); flash(saved?"Removed from Saved":"Saved to your collection 🔖"); };
  const share=()=>{ const txt=`${lesson.title} — ${lesson.note}`; if(navigator.clipboard) navigator.clipboard.writeText(txt).catch(()=>{}); flash("Summary copied 📋"); };
  const answerQuiz=(i)=>{ if(picked!==null) return; setPicked(i); const correct=i===lesson.quiz.answer; mutateEng(lesson.id, prev=>({...prev, quizAttempts:prev.quizAttempts+1, quizCorrect:prev.quizCorrect+(correct?1:0)})); flash(correct?"Correct! ✅":"Not quite — added to your focus areas"); };
  const replay=()=>{ setShowQuiz(false); setPicked(null); setBeat(0); setProg(0); setPlaying(true); };
  return (
    <>
      <div className="bg"></div><div className="orb a"></div><div className="orb b"></div>
      <div className="segs">{lesson.beats.map((_,i)=>(<div key={i} className={"s"+(i<beat?" done":"")}><span style={{width: i<beat?"100%": i===beat?`${prog*100}%`:"0%", transition: state.settings.motion?"width .12s linear":"none"}}></span></div>))}</div>
      <div className="clip-top"><span className="subj" style={{color:sc(lesson.subject)}}>{SUBJECTS[lesson.subject].name}</span><span className="dur">· {lesson.dur}</span></div>
      <div className="stage" onClick={()=>{ if(!showQuiz) setPlaying(p=>!p); }}>
        <div className="hook">{lesson.hook}</div>
        <div className="beats">{lesson.beats.map((b,i)=>(<div key={i} className={"beat"+(i===beat?" on":i<beat?" past":"")}>{b}</div>))}</div>
        {!playing && !showQuiz && active && <div className="paused-pill">▶</div>}
      </div>
      <div className="clip-meta">
        <div className="ttl">{lesson.title}</div>
        <div className="tpc">#{SUBJECTS[lesson.subject].name.replace(/\s/g,"")} · {lesson.topic}</div>
        <div className="chips">
          <button className="chip" onClick={()=>setSheet({type:"transcript", lessonId:lesson.id})}>📄 Transcript</button>
          <button className="chip" onClick={()=>setSheet({type:"note", lessonId:lesson.id})}>💡 Key note</button>
          <button className="chip pulse" onClick={()=>{ setShowQuiz(true); setPlaying(false); }}>✏️ Quiz</button>
        </div>
      </div>
      <div className="rail">
        <div className="badge" style={{background:sc(lesson.subject)}}>{SUBJECTS[lesson.subject].tag}</div>
        <button className="act" onClick={toggleLike}><span className={"ic"+(liked?" on-like":"")}>{liked?"❤️":"🤍"}</span><span className="lbl">{likeCount>999?(likeCount/1000).toFixed(1)+"k":likeCount}</span></button>
        <button className="act" onClick={toggleSave}><span className={"ic"+(saved?" on-save":"")}>{saved?"🔖":"🏷️"}</span><span className="lbl">{saveCount>999?(saveCount/1000).toFixed(1)+"k":saveCount}</span></button>
        <button className="act" onClick={()=>setSheet({type:"comments", lessonId:lesson.id})}><span className="ic">💬</span><span className="lbl">{e.comments.length||"Q&A"}</span></button>
        <button className="act" onClick={share}><span className="ic">↗️</span><span className="lbl">Share</span></button>
      </div>
      {active && !showQuiz && <div className="swipe-hint">swipe up for next ↑</div>}
      {showQuiz && (
        <div className="quiz">
          <div className="qh">Quick check before you swipe</div>
          <div className="qq">{lesson.quiz.q}</div>
          {lesson.quiz.opts.map((o,i)=>{ let cls="opt"; if(picked!==null){ if(i===lesson.quiz.answer) cls+=" correct"; else if(i===picked) cls+=" wrong"; } return <button key={i} className={cls} onClick={()=>answerQuiz(i)}>{o}</button>; })}
          {picked!==null && <div className="exp">{picked===lesson.quiz.answer?"✅ ":"💡 "}{lesson.quiz.exp}</div>}
          <div className="qrow"><button className="btn ghost sm" onClick={replay}>↺ Replay</button><button className="btn cyan sm" style={{flex:1}} onClick={scrollNext}>Next clip ↓</button></div>
        </div>
      )}
    </>
  );
}

/* ---------------- SHEET ---------------- */
function Sheet({sheet,state,mutateEng,flash,onClose}){
  const lesson=LESSON_BY_ID[sheet.lessonId]; const e=state.eng[sheet.lessonId]||blankEng(); const [txt,setTxt]=useState("");
  if(!lesson) return null;
  const addComment=()=>{ const v=txt.trim(); if(!v) return; mutateEng(lesson.id, prev=>({...prev, comments:[{id:uid(), text:v, date:todayStr()}, ...prev.comments]})); setTxt(""); flash("Note saved 💬"); };
  return (
    <div className="sheet-back" onClick={onClose}>
      <div className="sheet" onClick={ev=>ev.stopPropagation()}>
        <div className="grip"></div>
        <div className="sh-head"><strong style={{fontFamily:"var(--font-display)"}}>{sheet.type==="transcript"?"📄 Transcript":sheet.type==="note"?"💡 Key note":"💬 Notes & questions"}</strong><button className="pill" onClick={onClose}>Close</button></div>
        <div className="sh-body">
          <div className="pill" style={{marginBottom:12, color:sc(lesson.subject)}}>{SUBJECTS[lesson.subject].name} · {lesson.topic}</div>
          {sheet.type==="transcript" && <p style={{lineHeight:1.6, fontSize:15.5}}>{lesson.transcript}</p>}
          {sheet.type==="note" && <div className="card" style={{background:"var(--panel-2)", fontSize:16, lineHeight:1.5}}>{lesson.note}</div>}
          {sheet.type==="comments" && (
            <div className="stack">
              <p className="muted" style={{fontSize:13.5, margin:0}}>Jot a question or note-to-self for this lesson, to revisit anything that confused you.</p>
              <div className="row"><input type="text" value={txt} onChange={ev=>setTxt(ev.target.value)} placeholder="e.g. why is c the longest side?" onKeyDown={ev=>{ if(ev.key==="Enter") addComment(); }} /><button className="btn sm" onClick={addComment}>Add</button></div>
              {e.comments.length===0 && <div className="empty"><span className="ei">💬</span><p>No notes yet.</p></div>}
              {e.comments.map(c=>(<div key={c.id} className="card" style={{background:"var(--panel-2)"}}><div style={{fontSize:14.5}}>{c.text}</div><div className="dim" style={{fontSize:11.5, marginTop:4}}>{c.date}</div></div>))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---------------- SUBJECTS LIBRARY ---------------- */
/* ---------------- TEEEL REVISION ---------------- */
const TEEEL_PARTS=[
  {key:"t", label:"Topic", letter:"T", col:"var(--accent)"},
  {key:"e", label:"Explain", letter:"E", col:"var(--accent-2)"},
  {key:"ev", label:"Evidence", letter:"E", col:"var(--gold)"},
  {key:"va", label:"Evaluate", letter:"E", col:"var(--s-englit)"},
  {key:"l", label:"Link", letter:"L", col:"var(--good)"},
];
function TeeelBlock({te}){
  return (
    <div className="teeel">
      {TEEEL_PARTS.map(p=> te[p.key] ? (
        <div key={p.key} className="teeel-row">
          <span className="teeel-badge" style={{background:p.col}}>{p.letter}</span>
          <div><span className="tl">{p.label}</span><span className="tx">{te[p.key]}</span></div>
        </div>
      ) : null)}
    </div>
  );
}
function RevisionReader({guide, onBack}){
  return (
    <div className="page">
      <button className="pill" style={{marginBottom:12}} onClick={onBack}>← All subjects</button>
      <div className="row" style={{alignItems:"center", gap:12, marginBottom:4}}>
        <span style={{fontSize:34}}>{guide.icon}</span>
        <div><h2 style={{margin:0}}>{guide.title}</h2><div className="dim" style={{fontSize:12.5}}>{SUBJECTS[guide.subject].name} · revision deep-dive</div></div>
      </div>
      <p className="sub" style={{marginBottom:16}}>{guide.blurb}. Each section uses TEEEL: Topic, Explain, Evidence, Evaluate, Link.</p>
      <div className="stack">
        {guide.sections.map((sec,i)=>(
          <div key={i} className="card rev-sec" style={{"--sc":sc(guide.subject)}}>
            <h3 style={{fontSize:17}}>{sec.h}</h3>
            <TeeelBlock te={sec.te} />
            {sec.subs && sec.subs.map((sub,j)=>(
              <div key={j} className="rev-sub">
                <div style={{fontFamily:"var(--font-display)", fontWeight:600, fontSize:14.5, color:sc(guide.subject)}}>{sub.h}</div>
                <TeeelBlock te={sub.te} />
              </div>
            ))}
          </div>
        ))}
      </div>
      <button className="pill" style={{margin:"16px 0 4px"}} onClick={onBack}>← Back to all subjects</button>
    </div>
  );
}

/* ---------------- SUBJECTS LIBRARY ---------------- */
function SubjectsPage({state, play, setView}){
  const [open,setOpen]=useState(null);
  const groups=[
    {label:"Core", keys:["maths","englang","englit","bio","chem","phys"]},
    {label:"Humanities", keys:["history","geog","rs","classciv"]},
    {label:"Computing & creative", keys:["compsci","art","dt","drama","music","pe"]},
    {label:"Languages", keys:["french","german","spanish","italian","russian","japanese","latin","greek"]},
  ];
  return (
    <div className="page">
      <h2>All subjects 📚</h2>
      <p className="sub">Every GCSE subject — exam board, papers and topics. Tap a subject to expand and study.</p>
      <button className="card" style={{width:"100%", textAlign:"left", marginBottom:18, borderLeft:"5px solid var(--accent-2)", display:"flex", alignItems:"center", gap:12}} onClick={()=>setView("revise")}>
        <span style={{fontSize:26}}>📖</span>
        <span style={{flex:1}}><span style={{fontFamily:"var(--font-display)", fontWeight:600, fontSize:15.5, display:"block"}}>Revision deep-dives</span><span className="dim" style={{fontSize:12.5}}>Detailed TEEEL notes · 6 topics</span></span>
        <span className="pill">Open →</span>
      </button>
      {groups.map(g=>(
        <div key={g.label} style={{marginBottom:18}}>
          <div className="eyebrow" style={{margin:"0 2px 10px"}}>{g.label}</div>
          <div className="stack">
            {g.keys.map(k=>{ const s=SUBJECTS[k]; const lessons=LESSONS.filter(l=>l.subject===k); const isOpen=open===k;
              return (
                <div key={k} className="card subj-card" style={{"--sc":sc(k)}}>
                  <button className="between" style={{width:"100%", background:"none", textAlign:"left"}} onClick={()=>setOpen(isOpen?null:k)}>
                    <div className="row" style={{alignItems:"center"}}>
                      <span className="lb" style={{width:38,height:38,borderRadius:11,display:"grid",placeItems:"center",color:"#fff",fontFamily:"var(--font-display)",fontWeight:700, background:sc(k)}}>{s.tag}</span>
                      <div><div style={{fontFamily:"var(--font-display)", fontWeight:600, fontSize:16}}>{s.name}</div><div className="dim" style={{fontSize:12}}>{s.board}</div></div>
                    </div>
                    <span className="pill">{lessons.length?lessons.length+" clips":"soon"} {isOpen?"▲":"▼"}</span>
                  </button>
                  {isOpen && (
                    <div style={{marginTop:14}}>
                      <div className="eyebrow" style={{marginBottom:6}}>Assessment</div>
                      {s.papers.map((p,i)=>(<div key={i} className="muted" style={{fontSize:13.5, marginBottom:4}}>• {p}</div>))}
                      <div className="eyebrow" style={{margin:"12px 0 8px"}}>Topics</div>
                      <div>{s.topics.map(tp=>{ const has=lessons.some(l=>l.topic===tp); const tl=lessons.filter(l=>l.topic===tp);
                        return <button key={tp} className={"tchip"+(has?" has":"")} style={has?{background:sc(k), borderColor:"transparent"}:{}} onClick={()=>{ if(has) play(tl.map(l=>l.id),"subject",tl[0].id); }}>{tp}{has?` · ${tl.length}`:""}</button>; })}</div>
                      {lessons.length>0 && <button className="btn block sm" style={{marginTop:12, background:sc(k)}} onClick={()=>play(lessons.map(l=>l.id),"subject")}>▶ Play all {lessons.length} {s.name} clips</button>}
                      {lessons.length===0 && <p className="dim" style={{fontSize:12.5, marginTop:10}}>Lessons for this subject are coming. Topics and outcomes are shown above for revision planning.</p>}
                    </div>
                  )}
                </div>
              ); })}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ---------------- REVISE (dedicated tab) ---------------- */
function RevisePage(){
  const [guide,setGuide]=useState(null);
  if(guide) return <RevisionReader guide={REVISION_BY_ID[guide]} onBack={()=>setGuide(null)} />;
  return (
    <div className="page">
      <h2>Revise 📖</h2>
      <p className="sub">Detailed written revision guides. Every section uses TEEEL: Topic · Explain · Evidence · Evaluate · Link.</p>
      <div className="stack">
        {REVISION.map(r=>(
          <button key={r.id} className="card" onClick={()=>setGuide(r.id)} style={{textAlign:"left", borderLeft:"5px solid "+sc(r.subject), display:"flex", alignItems:"center", gap:12}}>
            <span className="lb" style={{width:44,height:44,borderRadius:13,display:"grid",placeItems:"center",fontSize:22, background:sc(r.subject)}}>{r.icon}</span>
            <span style={{flex:1, minWidth:0}}>
              <span style={{fontFamily:"var(--font-display)", fontWeight:600, fontSize:16, display:"block"}}>{r.title}</span>
              <span className="dim" style={{fontSize:12.5}}>{SUBJECTS[r.subject].name}</span>
              <span className="dim" style={{fontSize:12, display:"block"}}>{r.blurb}</span>
            </span>
            <span className="pill">Read →</span>
          </button>
        ))}
      </div>
      <p className="dim" style={{textAlign:"center", fontSize:11.5, marginTop:16}}>More topics can be added any time.</p>
    </div>
  );
}

/* ---------------- SAVED ---------------- */
function SavedPage({state, play, setView}){
  const saved=LESSONS.filter(l=>(state.eng[l.id]||{}).saved);
  const liked=LESSONS.filter(l=>(state.eng[l.id]||{}).liked);
  const bySubject={}; saved.forEach(l=>{ (bySubject[l.subject]=bySubject[l.subject]||[]).push(l); });
  return (
    <div className="page">
      <h2>Your collections 🔖</h2>
      <p className="sub">Save now, learn deeply later — this beats the scroll-and-forget trap.</p>
      {saved.length===0 ? (
        <div className="card empty"><span className="ei">🔖</span><p>Nothing saved yet. Tap the 🏷️ on any clip to keep it here.</p><button className="btn ghost sm" onClick={()=>setView("feed")}>Back to feed</button></div>
      ) : (
        <>
          <button className="btn cyan block" style={{marginBottom:16}} onClick={()=>play(saved.map(l=>l.id),"saved")}>▶ Play all {saved.length} saved</button>
          {Object.entries(bySubject).map(([subj,list])=>(
            <div key={subj} style={{marginBottom:18}}>
              <div className="eyebrow" style={{margin:"0 2px 8px", color:sc(subj)}}>{SUBJECTS[subj].name}</div>
              <div className="stack">{list.map(l=>(
                <button key={l.id} className="lesson-row" onClick={()=>play(saved.map(x=>x.id),"saved",l.id)}>
                  <span className="lb" style={{background:sc(l.subject)}}>{SUBJECTS[l.subject].tag}</span>
                  <span className="lm"><span className="lt">{l.title}</span><span className="ls">{l.topic} · {l.dur}</span></span><span className="pill">▶</span>
                </button>))}</div>
            </div>
          ))}
        </>
      )}
      {liked.length>0 && (
        <div style={{marginTop:8}}>
          <div className="eyebrow" style={{margin:"0 2px 8px"}}>❤️ Liked ({liked.length})</div>
          <div className="stack">{liked.map(l=>(
            <button key={l.id} className="lesson-row" onClick={()=>play(liked.map(x=>x.id),"custom",l.id)}>
              <span className="lb" style={{background:sc(l.subject)}}>{SUBJECTS[l.subject].tag}</span>
              <span className="lm"><span className="lt">{l.title}</span><span className="ls">{l.topic}</span></span><span className="pill">▶</span>
            </button>))}</div>
        </div>
      )}
    </div>
  );
}

/* ---------------- PATHWAY ---------------- */
function PathwayPage({state, play}){
  const seenCount=LESSONS.filter(l=>(state.eng[l.id]||{}).views>0).length;
  const str=strengths(state); const foc=focusAreas(state); const queue=pathwayQueue(state);
  return (
    <div className="page">
      <h2>Your pathway 🧭</h2>
      <p className="sub">Built from what you watch, save, like and answer — it learns where to send you next.</p>
      {seenCount<2 ? (
        <div className="card empty"><span className="ei">🧭</span><p>Watch a few clips first. Then this maps your strengths, your gaps and a plan to close them.</p><button className="btn block cyan" style={{marginTop:8}} onClick={()=>play(forYouQueue(state),"foryou")}>▶ Start the feed</button></div>
      ) : (
        <>
          <div className="card" style={{background:"linear-gradient(135deg, rgba(255,45,112,.18), rgba(39,224,196,.12))", borderColor:"transparent"}}>
            <div className="eyebrow">Recommended next</div>
            <h3 style={{fontSize:19, margin:"6px 0 4px"}}>{queue.length} clips lined up</h3>
            <p className="muted" style={{fontSize:13.5, margin:"0 0 12px"}}>Prioritising your focus areas, then anything new.</p>
            <button className="btn block" onClick={()=>play(queue,"pathway")}>▶ Play my pathway</button>
          </div>
          {foc.length>0 && (
            <div style={{marginTop:18}}>
              <div className="eyebrow" style={{margin:"0 2px 10px"}}>🎯 Focus areas — needs another look</div>
              <div className="stack">{foc.map(t=>(
                <div key={t.subject+t.topic} className="card">
                  <div className="between"><div><strong style={{fontFamily:"var(--font-display)"}}>{t.topic}</strong><div className="dim" style={{fontSize:12}}>{SUBJECTS[t.subject].name}{t.accuracy!=null?` · ${t.accuracy}% quiz accuracy`:" · not quizzed yet"}</div></div>
                    <button className="btn sm" onClick={()=>play(t.lessons,"pathway",t.lessons[0])}>Review</button></div>
                  <div className="bar" style={{marginTop:10}}><span style={{width:`${Math.round(t.gpAvg*100)}%`, background:"linear-gradient(90deg,var(--gold),var(--bad))"}}></span></div>
                </div>))}</div>
            </div>
          )}
          {str.length>0 && (
            <div style={{marginTop:18}}>
              <div className="eyebrow" style={{margin:"0 2px 10px"}}>💪 Your strengths</div>
              <div className="stack">{str.map(t=>(
                <div key={t.subject+t.topic} className="card between"><div><strong style={{fontFamily:"var(--font-display)"}}>{t.topic}</strong><div className="dim" style={{fontSize:12}}>{SUBJECTS[t.subject].name}{t.accuracy!=null?` · ${t.accuracy}% accuracy`:""}</div></div><span className="pill" style={{color:sc(t.subject)}}>strong</span></div>))}</div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ---------------- YOU ---------------- */
function YouPage({state,setState,flash}){
  let watch=0,attempts=0,correct=0,completed=0;
  LESSONS.forEach(l=>{ const e=state.eng[l.id]||blankEng(); watch+=e.watchMs; attempts+=e.quizAttempts; correct+=e.quizCorrect; completed+=e.completed>0?1:0; });
  const acc=attempts?Math.round(100*correct/attempts):0;
  const set=(k,v)=>setState(s=>({...s, settings:{...s.settings,[k]:v}}));
  const exportData=()=>{ const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"}); const u=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=u; a.download=`scrolllearn-backup-${todayStr()}.json`; a.click(); URL.revokeObjectURL(u); };
  const importData=(ev)=>{ const f=ev.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d&&d.eng){ save(d); location.reload(); } else flash("That file doesn't look right."); }catch(err){ flash("Couldn't read that file."); } }; r.readAsText(f); };
  const pct=Math.round(100*completed/LESSONS.length); const R=52, CIRC=2*Math.PI*R;
  const subjWithLessons=Object.values(SUBJECTS).filter(su=>LESSONS.some(l=>l.subject===su.key));
  return (
    <div className="page">
      <h2>You 📊</h2>
      <p className="sub">{state.profile.name}'s learning, by the numbers.</p>
      <div className="card" style={{display:"flex", alignItems:"center", gap:18}}>
        <div className="donut"><svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r={R} fill="none" stroke="var(--panel-2)" strokeWidth="12"/><circle cx="60" cy="60" r={R} fill="none" stroke="var(--accent)" strokeWidth="12" strokeLinecap="round" strokeDasharray={CIRC} strokeDashoffset={CIRC*(1-pct/100)} transform="rotate(-90 60 60)"/></svg><div className="n">{pct}%</div></div>
        <div><div style={{fontFamily:"var(--font-display)", fontWeight:700, fontSize:20}}>{completed} / {LESSONS.length}</div><div className="muted" style={{fontSize:13}}>lessons completed</div><div className="muted" style={{fontSize:13, marginTop:8}}>{state.session.date===todayStr()?state.session.completedToday:0} done today · goal {state.profile.clipGoal}</div></div>
      </div>
      <div className="row" style={{marginTop:12, gap:12}}>
        <div className="card" style={{flex:1, textAlign:"center"}}><div style={{fontSize:24}}>⏱️</div><div style={{fontFamily:"var(--font-display)",fontWeight:700,fontSize:18}}>{fmtTime(watch)}</div><div className="dim" style={{fontSize:12}}>watch time</div></div>
        <div className="card" style={{flex:1, textAlign:"center"}}><div style={{fontSize:24}}>🎯</div><div style={{fontFamily:"var(--font-display)",fontWeight:700,fontSize:18}}>{acc}%</div><div className="dim" style={{fontSize:12}}>quiz accuracy</div></div>
      </div>
      <div className="card" style={{marginTop:12}}>
        <div className="eyebrow" style={{marginBottom:10}}>Mastery by subject</div>
        <div className="stack">{subjWithLessons.map(su=>{ const ls=LESSONS.filter(l=>l.subject===su.key); const done=ls.filter(l=>(state.eng[l.id]||{}).completed>0).length; const p=ls.length?Math.round(100*done/ls.length):0;
          return (<div key={su.key}><div className="between" style={{marginBottom:5}}><span style={{fontSize:13.5, fontWeight:600}}>{su.name}</span><span className="dim" style={{fontSize:12}}>{done}/{ls.length}</span></div><div className="bar"><span style={{width:`${p}%`, background:sc(su.key)}}></span></div></div>); })}</div>
      </div>
      <div className="card" style={{marginTop:12}}>
        <div className="eyebrow" style={{marginBottom:10}}>Comfort & focus</div>
        <div className="stack">
          <div><div style={{fontSize:13.5, fontWeight:600, marginBottom:6}}>Calm mode (low stimulation)</div><div className="seg-ctl"><button className={!state.settings.calm?"on":""} onClick={()=>set("calm",false)}>Vivid</button><button className={state.settings.calm?"on":""} onClick={()=>set("calm",true)}>Calm</button></div></div>
          <div><div style={{fontSize:13.5, fontWeight:600, marginBottom:6}}>Animations</div><div className="seg-ctl"><button className={state.settings.motion?"on":""} onClick={()=>set("motion",1)}>On</button><button className={!state.settings.motion?"on":""} onClick={()=>set("motion",0)}>Reduced</button></div></div>
          <div><div style={{fontSize:13.5, fontWeight:600, marginBottom:6}}>Reading font</div><div className="seg-ctl"><button className={state.settings.font==="normal"?"on":""} onClick={()=>set("font","normal")}>Standard</button><button className={state.settings.font==="dyslexic"?"on":""} onClick={()=>set("font","dyslexic")}>Hyperlegible</button></div></div>
          <div><div style={{fontSize:13.5, fontWeight:600, marginBottom:6}}>Break reminders</div><div className="seg-ctl"><button className={state.settings.breaks?"on":""} onClick={()=>set("breaks",true)}>On</button><button className={!state.settings.breaks?"on":""} onClick={()=>set("breaks",false)}>Off</button></div></div>
        </div>
      </div>
      <div className="card" style={{marginTop:12}}>
        <div className="eyebrow" style={{marginBottom:10}}>Backup</div>
        <p className="muted" style={{fontSize:13, margin:"0 0 10px"}}>Progress is stored on this device. Export now and then to keep it safe.</p>
        <div className="row"><button className="btn ghost sm" onClick={exportData}>⬇ Export</button><label className="btn ghost sm" style={{cursor:"pointer"}}>⬆ Import<input type="file" accept="application/json" onChange={importData} style={{display:"none"}}/></label></div>
      </div>
      <p className="dim" style={{textAlign:"center", fontSize:11.5, marginTop:14}}>Bella's Brain · GCSE 2025–2027 · v2</p>
    </div>
  );
}
