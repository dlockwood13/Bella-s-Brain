<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a12" />
<title>Bella's Brain — GCSE Feed</title>
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="icon" type="image/png" href="./favicon.png" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Bella's Brain" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Lexend:wght@300;400;500;600;700&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --font-display:"Fredoka", system-ui, sans-serif;
    --font-body:"Lexend", system-ui, sans-serif;
    --bg:#0a0a12; --panel:#15131f; --panel-2:#1d1a2b;
    --ink:#f4f1ff; --ink-soft:#b3acce; --ink-dim:#7d769c; --line:rgba(255,255,255,.10);
    --accent:#ff2d70; --accent-2:#27e0c4; --gold:#ffce4d; --good:#2ee6a0; --bad:#ff5d73;
    --s-maths:#3f9dff; --s-bio:#22d18a; --s-chem:#ff9d3a; --s-phys:#7c7bff;
    --s-englang:#ff5e7a; --s-englit:#b07bff; --s-history:#d99a3c; --s-geog:#2bb6a8;
    --s-rs:#8e7be8; --s-classciv:#e07a5f; --s-compsci:#2bd4d4;
    --s-french:#5b8def; --s-german:#e0b13c; --s-spanish:#ff7a3c; --s-italian:#36b37e;
    --s-russian:#d65a8a; --s-japanese:#e0556f; --s-latin:#b58b5a; --s-greek:#6fa8dc;
    --s-art:#ff6fae; --s-dt:#8b95a7; --s-drama:#ff5d73; --s-music:#b388ff; --s-pe:#4cc38a;
    --s-default:#8aa6e0; --intensity:1;
  }
  [data-calm="1"]{ --intensity:.38; }
  [data-motion="0"] *{ animation:none!important; transition:none!important; }
  [data-font="dyslexic"]{ --font-body:"Atkinson Hyperlegible", system-ui, sans-serif; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; height:100%; background:var(--bg); color:var(--ink); font-family:var(--font-body); overscroll-behavior:none; }
  #root{ height:100%; }
  h1,h2,h3,h4{ font-family:var(--font-display); margin:0; font-weight:600; }
  button{ font-family:var(--font-body); cursor:pointer; border:none; background:none; color:inherit; }
  button:focus-visible{ outline:3px solid var(--accent-2); outline-offset:2px; border-radius:10px; }
  .app{ height:100%; max-width:520px; margin:0 auto; position:relative; background:var(--bg); overflow:hidden; }
  .feed{ height:100%; overflow-y:scroll; scroll-snap-type:y mandatory; scrollbar-width:none; }
  .feed::-webkit-scrollbar{ display:none; }
  .clip{ height:100%; min-height:100%; scroll-snap-align:start; scroll-snap-stop:always; position:relative; overflow:hidden; display:flex; flex-direction:column; justify-content:flex-end; }
  .clip .bg{ position:absolute; inset:0; z-index:0;
    background:radial-gradient(120% 80% at 20% 12%, color-mix(in srgb, var(--sc) calc(46% * var(--intensity)), transparent), transparent 60%),
      radial-gradient(120% 90% at 92% 96%, color-mix(in srgb, var(--accent) calc(30% * var(--intensity)), transparent), transparent 55%),
      linear-gradient(180deg, #100e1a, #0a0912); }
  .clip .bg::after{ content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,.15), rgba(0,0,0,.55) 86%); }
  .orb{ position:absolute; border-radius:50%; filter:blur(8px); opacity:calc(.5*var(--intensity)); z-index:0; }
  .orb.a{ width:140px;height:140px; right:-30px; top:14%; background:var(--sc); animation:drift 9s ease-in-out infinite; }
  .orb.b{ width:90px;height:90px; left:-20px; top:52%; background:var(--accent-2); animation:drift 11s ease-in-out infinite reverse; }
  @keyframes drift{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-22px); } }
  .segs{ position:absolute; top:calc(12px + env(safe-area-inset-top)); left:14px; right:14px; z-index:6; display:flex; gap:5px; }
  .segs .s{ flex:1; height:4px; border-radius:99px; background:rgba(255,255,255,.22); overflow:hidden; }
  .segs .s > span{ display:block; height:100%; width:0; background:#fff; }
  .clip-top{ position:absolute; top:calc(28px + env(safe-area-inset-top)); left:16px; right:16px; z-index:6; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .clip-top .subj{ font-family:var(--font-display); font-weight:600; font-size:13px; padding:5px 11px; border-radius:99px; background:rgba(0,0,0,.35); border:1px solid var(--line); backdrop-filter:blur(6px); }
  .clip-top .dur{ font-size:12px; color:var(--ink-soft); }
  .stage{ position:relative; z-index:3; flex:1; display:flex; flex-direction:column; justify-content:center; padding:84px 20px 16px; gap:14px; cursor:pointer; }
  .hook{ font-family:var(--font-display); font-weight:700; font-size:clamp(23px,6.6vw,33px); line-height:1.14; background:linear-gradient(180deg,#fff,#d8d2ff); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .beats{ display:flex; flex-direction:column; gap:10px; }
  .beat{ font-size:clamp(16px,4.2vw,20px); line-height:1.4; opacity:.28; transition:opacity .35s ease, transform .35s ease; }
  .beat.on{ opacity:1; font-weight:600; }
  .beat.on::before{ content:""; display:inline-block; width:9px;height:9px;border-radius:50%; background:var(--sc); margin-right:9px; vertical-align:middle; box-shadow:0 0 14px var(--sc); }
  .beat.past{ opacity:.5; }
  .paused-pill{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:5; font-size:46px; opacity:.85; pointer-events:none; }
  .clip-meta{ position:relative; z-index:4; padding:0 84px 96px 18px; }
  .clip-meta .ttl{ font-family:var(--font-display); font-weight:600; font-size:18px; }
  .clip-meta .tpc{ color:var(--ink-soft); font-size:13.5px; margin-top:2px; }
  .chips{ display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
  .chip{ display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; padding:8px 12px; border-radius:99px; background:rgba(255,255,255,.10); border:1px solid var(--line); backdrop-filter:blur(8px); }
  .chip.pulse{ animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(255,45,112,0);} 50%{ box-shadow:0 0 0 6px rgba(255,45,112,.18);} }
  .rail{ position:absolute; right:10px; bottom:104px; z-index:5; display:flex; flex-direction:column; align-items:center; gap:17px; }
  .rail .act{ display:flex; flex-direction:column; align-items:center; gap:3px; }
  .rail .ic{ width:50px; height:50px; border-radius:50%; display:grid; place-items:center; font-size:23px; background:rgba(255,255,255,.10); border:1px solid var(--line); backdrop-filter:blur(8px); transition:transform .12s ease; }
  .rail .act:active .ic{ transform:scale(.88); }
  .rail .ic.on-like{ background:rgba(255,45,112,.22); border-color:rgba(255,45,112,.5); }
  .rail .ic.on-save{ background:rgba(255,206,77,.20); border-color:rgba(255,206,77,.5); }
  .rail .lbl{ font-size:11px; font-weight:700; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.5); }
  .rail .badge{ width:46px;height:46px;border-radius:14px; display:grid;place-items:center; font-family:var(--font-display); font-weight:700; font-size:18px; color:#fff; box-shadow:0 6px 18px rgba(0,0,0,.4); margin-bottom:2px; }
  .swipe-hint{ position:absolute; left:0; right:0; bottom:84px; z-index:4; text-align:center; font-size:12px; color:var(--ink-soft); animation:bob 1.8s ease-in-out infinite; pointer-events:none;}
  @keyframes bob{ 0%,100%{ transform:translateY(0); opacity:.5;} 50%{ transform:translateY(-5px); opacity:1;} }
  .quiz{ position:absolute; left:12px; right:12px; bottom:88px; z-index:8; background:var(--panel); border:1px solid var(--line); border-radius:22px; padding:18px; box-shadow:0 -10px 40px rgba(0,0,0,.5); animation:slideup .3s ease; }
  @keyframes slideup{ from{ transform:translateY(20px); opacity:0;} to{ transform:translateY(0); opacity:1;} }
  .quiz .qh{ font-size:12px; font-weight:700; color:var(--accent-2); text-transform:uppercase; letter-spacing:1px; }
  .quiz .qq{ font-family:var(--font-display); font-weight:600; font-size:18px; margin:6px 0 12px; }
  .quiz .opt{ display:block; width:100%; text-align:left; padding:13px 14px; border-radius:14px; background:var(--panel-2); border:1.5px solid var(--line); margin-bottom:8px; font-size:15px; font-weight:500; transition:all .15s ease; }
  .quiz .opt.correct{ background:rgba(46,230,160,.16); border-color:var(--good); }
  .quiz .opt.wrong{ background:rgba(255,93,115,.16); border-color:var(--bad); }
  .quiz .exp{ font-size:14px; color:var(--ink-soft); margin:6px 2px 12px; line-height:1.45; }
  .quiz .qrow{ display:flex; gap:10px; }
  .nav{ position:absolute; left:0; right:0; bottom:0; z-index:30; height:62px; display:flex; justify-content:space-around; align-items:center; background:rgba(12,11,20,.82); backdrop-filter:blur(14px); border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom); }
  .nav button{ flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; gap:1px; color:var(--ink-dim); font-size:8.5px; font-weight:600; padding:6px 1px; letter-spacing:-.1px; }
  .nav button .ni{ font-size:18px; }
  .nav button.active{ color:#fff; }
  .nav button.active .ni{ filter:drop-shadow(0 0 10px var(--accent)); }
  .sheet-back{ position:absolute; inset:0; z-index:40; background:rgba(0,0,0,.55); backdrop-filter:blur(2px); display:flex; align-items:flex-end; animation:fade .2s ease; }
  @keyframes fade{ from{opacity:0;} to{opacity:1;} }
  .sheet{ width:100%; max-height:78%; background:var(--panel); border-radius:24px 24px 0 0; border-top:1px solid var(--line); padding:8px 0 calc(16px + env(safe-area-inset-bottom)); display:flex; flex-direction:column; animation:slideup .25s ease; }
  .sheet .grip{ width:42px;height:5px;border-radius:99px;background:rgba(255,255,255,.25); margin:8px auto 6px; }
  .sheet .sh-head{ display:flex; align-items:center; justify-content:space-between; padding:6px 18px 10px; }
  .sheet .sh-body{ overflow-y:auto; padding:0 18px 8px; }
  .page{ position:absolute; inset:0; bottom:62px; z-index:20; overflow-y:auto; background:var(--bg); padding:calc(18px + env(safe-area-inset-top)) 16px 24px; }
  .page h2{ font-size:24px; margin-bottom:4px; }
  .page .sub{ color:var(--ink-soft); font-size:14px; margin-bottom:18px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:16px; }
  .card+.card{ margin-top:12px; }
  .stack{ display:flex; flex-direction:column; gap:12px; }
  .row{ display:flex; gap:10px; }
  .between{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .muted{ color:var(--ink-soft); } .dim{ color:var(--ink-dim); }
  .pill{ display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:5px 11px; border-radius:99px; background:var(--panel-2); border:1px solid var(--line); color:var(--ink-soft); }
  .eyebrow{ font-family:var(--font-display); font-weight:600; text-transform:uppercase; letter-spacing:1.2px; font-size:11.5px; color:var(--ink-dim); }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; background:var(--accent); color:#fff; font-weight:700; padding:13px 16px; border-radius:14px; font-size:15px; }
  .btn.block{ width:100%; } .btn.cyan{ background:var(--accent-2); color:#06251f; }
  .btn.ghost{ background:var(--panel-2); color:var(--ink); border:1px solid var(--line); font-weight:600; }
  .btn.sm{ padding:9px 12px; font-size:13.5px; border-radius:11px; } .btn[disabled]{ opacity:.4; }
  .bar{ height:10px; border-radius:99px; background:var(--panel-2); overflow:hidden; border:1px solid var(--line); }
  .bar > span{ display:block; height:100%; border-radius:99px; }
  .lesson-row{ display:flex; align-items:center; gap:12px; width:100%; text-align:left; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:12px; }
  .lesson-row .lb{ width:38px;height:38px;border-radius:11px; display:grid;place-items:center; color:#fff; font-family:var(--font-display); font-weight:700; flex:none; font-size:15px; }
  .lesson-row .lm{ flex:1; min-width:0; } .lesson-row .lm .lt{ font-weight:600; font-size:14.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lesson-row .lm .ls{ font-size:12px; color:var(--ink-dim); }
  input[type=text], textarea{ width:100%; font-family:var(--font-body); font-size:15px; color:var(--ink); background:var(--panel-2); border:1.5px solid var(--line); border-radius:12px; padding:12px; }
  textarea{ resize:vertical; min-height:70px; }
  .empty{ text-align:center; padding:40px 16px; color:var(--ink-dim); } .empty .ei{ font-size:42px; }
  .toast{ position:absolute; left:50%; bottom:80px; transform:translateX(-50%); z-index:60; background:#fff; color:#13111c; font-weight:700; padding:11px 18px; border-radius:14px; font-size:14px; box-shadow:0 10px 30px rgba(0,0,0,.4); animation:slideup .25s ease; max-width:88%; }
  .nudge{ position:absolute; top:calc(48px + env(safe-area-inset-top)); left:12px; right:12px; z-index:25; background:rgba(20,18,30,.92); border:1px solid var(--line); border-radius:16px; padding:12px 14px; backdrop-filter:blur(10px); display:flex; align-items:center; gap:10px; animation:slideup .3s ease; }
  .nudge .x{ margin-left:auto; font-size:18px; color:var(--ink-soft); padding:4px 8px; }
  .seg-ctl{ display:flex; background:var(--panel-2); border:1px solid var(--line); border-radius:13px; padding:4px; gap:4px; }
  .seg-ctl button{ flex:1; padding:9px; border-radius:9px; font-weight:600; font-size:13.5px; color:var(--ink-soft); }
  .seg-ctl button.on{ background:var(--panel); color:#fff; }
  .donut{ position:relative; width:120px; height:120px; }
  .donut .n{ position:absolute; inset:0; display:grid; place-items:center; font-family:var(--font-display); font-weight:700; font-size:30px; }
  .subj-card{ border-left:5px solid var(--sc,var(--s-default)); }
  .tchip{ display:inline-block; font-size:12px; font-weight:600; padding:5px 10px; border-radius:99px; margin:0 6px 6px 0; background:var(--panel-2); border:1px solid var(--line); }
  .tchip.has{ color:#fff; }
  .teeel{ display:flex; flex-direction:column; gap:9px; margin-top:10px; }
  .teeel-row{ display:flex; gap:10px; }
  .teeel-badge{ flex:none; width:26px; height:26px; border-radius:8px; display:grid; place-items:center; font-family:var(--font-display); font-weight:700; font-size:13px; color:#0a0a12; }
  .teeel-row .tl{ font-weight:700; font-size:10.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--ink-dim); display:block; margin-bottom:2px; }
  .teeel-row .tx{ font-size:14px; line-height:1.5; }
  .rev-sec{ border-left:4px solid var(--sc,var(--s-default)); }
  .rev-sub{ margin-top:12px; padding-left:12px; border-left:2px dashed var(--line); }
</style>
