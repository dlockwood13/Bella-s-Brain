<style>
  :root{
    --font-display:"Fredoka", system-ui, sans-serif;
    --font-body:"Lexend", system-ui, sans-serif;
    --bg:#0a0a12; --panel:#15131f; --panel-2:#1d1a2b;
    --ink:#f4f1ff; --ink-soft:#b3acce; --ink-dim:#7d769c; --line:rgba(255,255,255,.10);
    --accent:#ff2d70; --accent-2:#27e0c4; --gold:#ffce4d; --good:#2ee6a0; --bad:#ff5d73;
    --s-maths:#3f9dff; --s-bio:#22d18a; --s-chem:#ff9d3a; --s-phys:#7c7bff;
    --s-englang:#ff5e7a; --s-englit:#b07bff; --s-history:#d99a3c; --s-geog:#2bb6a8;
    --s-rs:#8e7be8; --s-classciv:#e07a5f; --s-compsci:#2bd4d4;
    --s-french:#5b8def; --s-german:#e0b13c; --s-spanish:#ff7a3c; --s-italian:#36b37e;
    --s-russian:#d65a8a; --s-japanese:#e0556f; --s-latin:#b58b5a; --s-greek:#6fa8dc;
    --s-art:#ff6fae; --s-dt:#8b95a7; --s-drama:#ff5d73; --s-music:#b388ff; --s-pe:#4cc38a;
    --s-default:#8aa6e0; --intensity:1;

  [data-calm="1"]{ --intensity:.38; }
  [data-motion="0"] *{ animation:none!important; transition:none!important; }
  [data-font="dyslexic"]{ --font-body:"Atkinson Hyperlegible", system-ui, sans-serif; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; height:100%; background:var(--bg); color:var(--ink); font-family:var(--font-body); overscroll-behavior:none; }
  #root{ height:100%; }
  h1,h2,h3,h4{ font-family:var(--font-display); margin:0; font-weight:600; }
  button{ font-family:var(--font-body); cursor:pointer; border:none; background:none; color:inherit; }
  button:focus-visible{ outline:3px solid var(--accent-2); outline-offset:2px; border-radius:10px; }
  .app{ height:100%; max-width:520px; margin:0 auto; position:relative; background:var(--bg); overflow:hidden; }
  .feed{ height:100%; overflow-y:scroll; scroll-snap-type:y mandatory; scrollbar-width:none; }
  .feed::-webkit-scrollbar{ display:none; }
  .clip{ height:100%; min-height:100%; scroll-snap-align:start; scroll-snap-stop:always; position:relative; overflow:hidden; display:flex; flex-direction:column; justify-content:flex-end; }
  .clip .bg{ position:absolute; inset:0; z-index:0;
    background:radial-gradient(120% 80% at 20% 12%, color-mix(in srgb, var(--sc) calc(46% * var(--intensity)), transparent), transparent 60%),
      radial-gradient(120% 90% at 92% 96%, color-mix(in srgb, var(--accent) calc(30% * var(--intensity)), transparent), transparent 55%),
      linear-gradient(180deg, #100e1a, #0a0912); }
  .clip .bg::after{ content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,.15), rgba(0,0,0,.55) 86%); }
  .orb{ position:absolute; border-radius:50%; filter:blur(8px); opacity:calc(.5*var(--intensity)); z-index:0; }
  .orb.a{ width:140px;height:140px; right:-30px; top:14%; background:var(--sc); animation:drift 9s ease-in-out infinite; }
  .orb.b{ width:90px;height:90px; left:-20px; top:52%; background:var(--accent-2); animation:drift 11s ease-in-out infinite reverse; }
  @keyframes drift{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-22px); } }
  .segs{ position:absolute; top:calc(12px + env(safe-area-inset-top)); left:14px; right:14px; z-index:6; display:flex; gap:5px; }
  .segs .s{ flex:1; height:4px; border-radius:99px; background:rgba(255,255,255,.22); overflow:hidden; }
  .segs .s > span{ display:block; height:100%; width:0; background:#fff; }
  .clip-top{ position:absolute; top:calc(28px + env(safe-area-inset-top)); left:16px; right:16px; z-index:6; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .clip-top .subj{ font-family:var(--font-display); font-weight:600; font-size:13px; padding:5px 11px; border-radius:99px; background:rgba(0,0,0,.35); border:1px solid var(--line); backdrop-filter:blur(6px); }
  .clip-top .dur{ font-size:12px; color:var(--ink-soft); }
  .stage{ position:relative; z-index:3; flex:1; display:flex; flex-direction:column; justify-content:center; padding:84px 20px 16px; gap:14px; cursor:pointer; }
  .hook{ font-family:var(--font-display); font-weight:700; font-size:clamp(23px,6.6vw,33px); line-height:1.14; background:linear-gradient(180deg,#fff,#d8d2ff); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .beats{ display:flex; flex-direction:column; gap:10px; }
  .beat{ font-size:clamp(16px,4.2vw,20px); line-height:1.4; opacity:.28; transition:opacity .35s ease, transform .35s ease; }
  .beat.on{ opacity:1; font-weight:600; }
  .beat.on::before{ content:""; display:inline-block; width:9px;height:9px;border-radius:50%; background:var(--sc); margin-right:9px; vertical-align:middle; box-shadow:0 0 14px var(--sc); }
  .beat.past{ opacity:.5; }
  .paused-pill{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:5; font-size:46px; opacity:.85; pointer-events:none; }
  .clip-meta{ position:relative; z-index:4; padding:0 84px 96px 18px; }
  .clip-meta .ttl{ font-family:var(--font-display); font-weight:600; font-size:18px; }
  .clip-meta .tpc{ color:var(--ink-soft); font-size:13.5px; margin-top:2px; }
  .chips{ display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
  .chip{ display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; padding:8px 12px; border-radius:99px; background:rgba(255,255,255,.10); border:1px solid var(--line); backdrop-filter:blur(8px); }
  .chip.pulse{ animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(255,45,112,0);} 50%{ box-shadow:0 0 0 6px rgba(255,45,112,.18);} }
  .rail{ position:absolute; right:10px; bottom:104px; z-index:5; display:flex; flex-direction:column; align-items:center; gap:17px; }
  .rail .act{ display:flex; flex-direction:column; align-items:center; gap:3px; }
  .rail .ic{ width:50px; height:50px; border-radius:50%; display:grid; place-items:center; font-size:23px; background:rgba(255,255,255,.10); border:1px solid var(--line); backdrop-filter:blur(8px); transition:transform .12s ease; }
  .rail .act:active .ic{ transform:scale(.88); }
  .rail .ic.on-like{ background:rgba(255,45,112,.22); border-color:rgba(255,45,112,.5); }
  .rail .ic.on-save{ background:rgba(255,206,77,.20); border-color:rgba(255,206,77,.5); }
  .rail .lbl{ font-size:11px; font-weight:700; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.5); }
  .rail .badge{ width:46px;height:46px;border-radius:14px; display:grid;place-items:center; font-family:var(--font-display); font-weight:700; font-size:18px; color:#fff; box-shadow:0 6px 18px rgba(0,0,0,.4); margin-bottom:2px; }
  .swipe-hint{ position:absolute; left:0; right:0; bottom:84px; z-index:4; text-align:center; font-size:12px; color:var(--ink-soft); animation:bob 1.8s ease-in-out infinite; pointer-events:none;}
  @keyframes bob{ 0%,100%{ transform:translateY(0); opacity:.5;} 50%{ transform:translateY(-5px); opacity:1;} }
  .quiz{ position:absolute; left:12px; right:12px; bottom:88px; z-index:8; background:var(--panel); border:1px solid var(--line); border-radius:22px; padding:18px; box-shadow:0 -10px 40px rgba(0,0,0,.5); animation:slideup .3s ease; }
  @keyframes slideup{ from{ transform:translateY(20px); opacity:0;} to{ transform:translateY(0); opacity:1;} }
  .quiz .qh{ font-size:12px; font-weight:700; color:var(--accent-2); text-transform:uppercase; letter-spacing:1px; }
  .quiz .qq{ font-family:var(--font-display); font-weight:600; font-size:18px; margin:6px 0 12px; }
  .quiz .opt{ display:block; width:100%; text-align:left; padding:13px 14px; border-radius:14px; background:var(--panel-2); border:1.5px solid var(--line); margin-bottom:8px; font-size:15px; font-weight:500; transition:all .15s ease; }
  .quiz .opt.correct{ background:rgba(46,230,160,.16); border-color:var(--good); }
  .quiz .opt.wrong{ background:rgba(255,93,115,.16); border-color:var(--bad); }
  .quiz .exp{ font-size:14px; color:var(--ink-soft); margin:6px 2px 12px; line-height:1.45; }
  .quiz .qrow{ display:flex; gap:10px; }
  .nav{ position:absolute; left:0; right:0; bottom:0; z-index:30; height:62px; display:flex; justify-content:space-around; align-items:center; background:rgba(12,11,20,.82); backdrop-filter:blur(14px); border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom); }
  .nav button{ flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; gap:1px; color:var(--ink-dim); font-size:8.5px; font-weight:600; padding:6px 1px; letter-spacing:-.1px; }
  .nav button .ni{ font-size:18px; }
  .nav button.active{ color:#fff; }
  .nav button.active .ni{ filter:drop-shadow(0 0 10px var(--accent)); }
  .sheet-back{ position:absolute; inset:0; z-index:40; background:rgba(0,0,0,.55); backdrop-filter:blur(2px); display:flex; align-items:flex-end; animation:fade .2s ease; }
  @keyframes fade{ from{opacity:0;} to{opacity:1;} }
  .sheet{ width:100%; max-height:78%; background:var(--panel); border-radius:24px 24px 0 0; border-top:1px solid var(--line); padding:8px 0 calc(16px + env(safe-area-inset-bottom)); display:flex; flex-direction:column; animation:slideup .25s ease; }
  .sheet .grip{ width:42px;height:5px;border-radius:99px;background:rgba(255,255,255,.25); margin:8px auto 6px; }
  .sheet .sh-head{ display:flex; align-items:center; justify-content:space-between; padding:6px 18px 10px; }
  .sheet .sh-body{ overflow-y:auto; padding:0 18px 8px; }
  .page{ position:absolute; inset:0; bottom:62px; z-index:20; overflow-y:auto; background:var(--bg); padding:calc(18px + env(safe-area-inset-top)) 16px 24px; }
  .page h2{ font-size:24px; margin-bottom:4px; }
  .page .sub{ color:var(--ink-soft); font-size:14px; margin-bottom:18px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:16px; }
  .card+.card{ margin-top:12px; }
  .stack{ display:flex; flex-direction:column; gap:12px; }
  .row{ display:flex; gap:10px; }
  .between{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .muted{ color:var(--ink-soft); } .dim{ color:var(--ink-dim); }
  .pill{ display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:5px 11px; border-radius:99px; background:var(--panel-2); border:1px solid var(--line); color:var(--ink-soft); }
  .eyebrow{ font-family:var(--font-display); font-weight:600; text-transform:uppercase; letter-spacing:1.2px; font-size:11.5px; color:var(--ink-dim); }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; background:var(--accent); color:#fff; font-weight:700; padding:13px 16px; border-radius:14px; font-size:15px; }
  .btn.block{ width:100%; } .btn.cyan{ background:var(--accent-2); color:#06251f; }
  .btn.ghost{ background:var(--panel-2); color:var(--ink); border:1px solid var(--line); font-weight:600; }
  .btn.sm{ padding:9px 12px; font-size:13.5px; border-radius:11px; } .btn[disabled]{ opacity:.4; }
  .bar{ height:10px; border-radius:99px; background:var(--panel-2); overflow:hidden; border:1px solid var(--line); }
  .bar > span{ display:block; height:100%; border-radius:99px; }
  .lesson-row{ display:flex; align-items:center; gap:12px; width:100%; text-align:left; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:12px; }
  .lesson-row .lb{ width:38px;height:38px;border-radius:11px; display:grid;place-items:center; color:#fff; font-family:var(--font-display); font-weight:700; flex:none; font-size:15px; }
  .lesson-row .lm{ flex:1; min-width:0; } .lesson-row .lm .lt{ font-weight:600; font-size:14.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lesson-row .lm .ls{ font-size:12px; color:var(--ink-dim); }
  input[type=text], textarea{ width:100%; font-family:var(--font-body); font-size:15px; color:var(--ink); background:var(--panel-2); border:1.5px solid var(--line); border-radius:12px; padding:12px; }
  textarea{ resize:vertical; min-height:70px; }
  .empty{ text-align:center; padding:40px 16px; color:var(--ink-dim); } .empty .ei{ font-size:42px; }
  .toast{ position:absolute; left:50%; bottom:80px; transform:translateX(-50%); z-index:60; background:#fff; color:#13111c; font-weight:700; padding:11px 18px; border-radius:14px; font-size:14px; box-shadow:0 10px 30px rgba(0,0,0,.4); animation:slideup .25s ease; max-width:88%; }
  .nudge{ position:absolute; top:calc(48px + env(safe-area-inset-top)); left:12px; right:12px; z-index:25; background:rgba(20,18,30,.92); border:1px solid var(--line); border-radius:16px; padding:12px 14px; backdrop-filter:blur(10px); display:flex; align-items:center; gap:10px; animation:slideup .3s ease; }
  .nudge .x{ margin-left:auto; font-size:18px; color:var(--ink-soft); padding:4px 8px; }
  .seg-ctl{ display:flex; background:var(--panel-2); border:1px solid var(--line); border-radius:13px; padding:4px; gap:4px; }
  .seg-ctl button{ flex:1; padding:9px; border-radius:9px; font-weight:600; font-size:13.5px; color:var(--ink-soft); }
  .seg-ctl button.on{ background:var(--panel); color:#fff; }
  .donut{ position:relative; width:120px; height:120px; }
  .donut .n{ position:absolute; inset:0; display:grid; place-items:center; font-family:var(--font-display); font-weight:700; font-size:30px; }
  .subj-card{ border-left:5px solid var(--sc,var(--s-default)); }
  .tchip{ display:inline-block; font-size:12px; font-weight:600; padding:5px 10px; border-radius:99px; margin:0 6px 6px 0; background:var(--panel-2); border:1px solid var(--line); }
  .tchip.has{ color:#fff; }
  .teeel{ display:flex; flex-direction:column; gap:9px; margin-top:10px; }
  .teeel-row{ display:flex; gap:10px; }
  .teeel-badge{ flex:none; width:26px; height:26px; border-radius:8px; display:grid; place-items:center; font-family:var(--font-display); font-weight:700; font-size:13px; color:#0a0a12; }
  .teeel-row .tl{ font-weight:700; font-size:10.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--ink-dim); display:block; margin-bottom:2px; }
  .teeel-row .tx{ font-size:14px; line-height:1.5; }
  .rev-sec{ border-left:4px solid var(--sc,var(--s-default)); }
  .rev-sub{ margin-top:12px; padding-left:12px; border-left:2px dashed var(--line); }
</style>

L({id:"hi-medicine",subject:"history",topic:"Medicine through time",title:"Germ theory changes everything",hook:"1861: the idea that rewired medicine.",
  beats:["Before: 'miasma' (bad air) was blamed for disease.","1861: Pasteur proved germs cause decay and disease.","Koch later linked specific microbes to specific diseases.","This opened the door to vaccines and antiseptics."],
  transcript:"For centuries disease was blamed on miasma — bad air. In 1861 Louis Pasteur's Germ Theory showed microorganisms cause disease, and Robert Koch identified specific microbes for specific illnesses. This transformed prevention, surgery and public health.",
  note:"Pasteur's Germ Theory (1861): microbes cause disease — replaced miasma theory.",
  quiz:{q:"What did people blame for disease BEFORE germ theory?",opts:["Bacteria","Miasma (bad air)","Viruses"],answer:1,exp:"Miasma theory blamed bad air; germ theory replaced it in 1861."}}),
L({id:"hi-penicillin",subject:"history",topic:"Medicine through time",title:"Fleming & penicillin",hook:"A mouldy dish that saved millions.",
  beats:["1928: Fleming noticed mould killing bacteria.","He identified penicillin but couldn't mass-produce it.","Florey & Chain purified and produced it in the 1940s.","WWII demand drove mass production."],
  transcript:"In 1928 Alexander Fleming observed that Penicillium mould killed bacteria, discovering penicillin. He couldn't mass-produce it, but in the 1940s Florey and Chain developed methods to purify and produce it at scale, spurred by wartime need.",
  note:"Fleming discovered penicillin (1928); Florey & Chain mass-produced it (1940s).",
  quiz:{q:"Who first observed penicillin's effect?",opts:["Florey","Fleming","Pasteur"],answer:1,exp:"Alexander Fleming noticed the mould killing bacteria in 1928."}}),
L({id:"hi-armada",subject:"history",topic:"Early Elizabethan England 1558–88",title:"The Spanish Armada, 1588",hook:"Why Philip's invasion fleet failed.",
  beats:["1588: Spain sent a huge fleet to invade England.","English fireships scattered them at Calais.","The 'Protestant wind' wrecked many ships.","A major boost to Elizabeth's authority."],
  transcript:"In 1588 Philip II of Spain launched the Armada to invade Protestant England. English tactics, including fireships at Calais, broke the Spanish formation, and storms — the 'Protestant wind' — destroyed many ships on the way home. The victory strengthened Elizabeth's position.",
  note:"1588 Armada defeated by English tactics + storms; boosted Elizabeth's authority.",
  quiz:{q:"In which year was the Spanish Armada defeated?",opts:["1558","1588","1601"],answer:1,exp:"The Armada was defeated in 1588."}}),
L({id:"hi-settlement",subject:"history",topic:"Early Elizabethan England 1558–88",title:"The Religious Settlement of 1559",hook:"Elizabeth's 'middle way'.",
  beats:["England was split between Catholics and Protestants.","1559: the Act of Supremacy made Elizabeth Supreme Governor.","The Act of Uniformity set a common prayer book.","A compromise to keep the peace."],
  transcript:"On her accession Elizabeth faced deep religious division. The 1559 Settlement — the Act of Supremacy and Act of Uniformity — made her Supreme Governor of the Church and imposed a common form of worship, a deliberate 'middle way' to reduce conflict.",
  note:"1559 Settlement: Act of Supremacy + Act of Uniformity = Elizabeth's 'middle way'.",
  quiz:{q:"What title did the 1559 Act of Supremacy give Elizabeth?",opts:["Supreme Head","Supreme Governor","Pope of England"],answer:1,exp:"She became Supreme Governor of the Church of England."}}),
L({id:"hi-cuba",subject:"history",topic:"Superpower relations & the Cold War 1941–91",title:"The Cuban Missile Crisis, 1962",hook:"Thirteen days at the brink.",
  beats:["1962: USSR placed nuclear missiles in Cuba.","The US imposed a naval blockade.","Kennedy and Khrushchev negotiated a deal.","USSR withdrew; US secretly removed missiles from Turkey."],
  transcript:"In October 1962 American spy planes found Soviet nuclear missiles in Cuba. Kennedy ordered a naval blockade and after thirteen tense days a deal was struck: the USSR removed the missiles in return for a US pledge not to invade Cuba and the secret removal of US missiles from Turkey.",
  note:"1962 Cuban Missile Crisis: 13 days; blockade; USSR withdraws missiles after a deal.",
  quiz:{q:"How did the US first respond to missiles in Cuba?",opts:["Invasion","A naval blockade","A nuclear strike"],answer:1,exp:"Kennedy ordered a naval blockade (a 'quarantine') of Cuba."}}),
L({id:"hi-berlin",subject:"history",topic:"Superpower relations & the Cold War 1941–91",title:"The Berlin Wall, 1961",hook:"A city, and a world, divided overnight.",
  beats:["Berlin sat deep inside communist East Germany.","Thousands fled west through the city.","1961: the East built a wall to stop the exodus.","It became the symbol of the Cold War."],
  transcript:"Divided Berlin let East Germans escape to the West, draining the communist state of workers. In 1961 the East German government built the Berlin Wall to seal the border, which became the defining symbol of the Cold War until it fell in 1989.",
  note:"1961: Berlin Wall built to stop East→West escapes; symbol of the Cold War (fell 1989).",
  quiz:{q:"Why was the Berlin Wall built in 1961?",opts:["To attract tourists","To stop East Germans fleeing west","To start a war"],answer:1,exp:"It was built to halt the flow of refugees from East to West."}}),
L({id:"hi-russia",subject:"history",topic:"Russia & the Soviet Union 1917–41",title:"1917: two revolutions",hook:"The year the Tsar fell — twice over.",
  beats:["February 1917: the Tsar abdicated; a Provisional Government formed.","It kept Russia in WWI — hugely unpopular.","October 1917: Lenin's Bolsheviks seized power.","Promised 'Peace, Bread, Land'."],
  transcript:"In February 1917 strikes and mutiny forced Tsar Nicholas II to abdicate, and a Provisional Government took over. Its decision to continue the war was deeply unpopular, and in October the Bolsheviks under Lenin seized power, promising peace, bread and land.",
  note:"1917: February (Tsar abdicates) then October (Bolsheviks/Lenin seize power).",
  quiz:{q:"Who led the October 1917 revolution?",opts:["Stalin","Lenin","The Tsar"],answer:1,exp:"Lenin led the Bolsheviks to power in October 1917."}}),
L({id:"hi-fiveyear",subject:"history",topic:"Russia & the Soviet Union 1917–41",title:"Stalin's Five-Year Plans",hook:"Industrialise — at any human cost.",
  beats:["From 1928, plans set huge industrial targets.","Focus on coal, steel, iron, machinery.","Output soared, but conditions were brutal.","Collectivisation of farms caused mass famine."],
  transcript:"From 1928 Stalin's Five-Year Plans set ambitious targets to industrialise the USSR rapidly, prioritising heavy industry. Production rose dramatically but at enormous human cost, while the forced collectivisation of agriculture led to famine and millions of deaths.",
  note:"Five-Year Plans (from 1928): rapid heavy industry; collectivisation → famine.",
  quiz:{q:"What did the Five-Year Plans mainly focus on?",opts:["Consumer goods","Heavy industry","Tourism"],answer:1,exp:"They prioritised heavy industry — coal, steel, iron, machinery."}}),

/* ---------------- GEOGRAPHY ---------------- */
L({id:"geo-river",subject:"geog",topic:"Rivers",title:"How a meander forms",hook:"Why rivers wind instead of running straight.",
  beats:["Faster water on the outer bend erodes it.","Slower water on the inner bend deposits sediment.","The bend grows more curved over time.","Eventually it can pinch off into an oxbow lake."],
  transcript:"On a meander, water flows fastest on the outside bend, eroding a steep river cliff, while the slow inside bend deposits a slip-off slope. Over time the curve exaggerates, and the neck can be cut through to leave an oxbow lake.",
  note:"Meander: outer bend erodes (cliff), inner bend deposits (slip-off) → oxbow lake.",
  quiz:{q:"On a meander, erosion is greatest on the…",opts:["Inner bend","Outer bend","River bed only"],answer:1,exp:"The faster outer bend erodes; the slower inner bend deposits."}}),
L({id:"geo-coast",subject:"geog",topic:"Coasts",title:"Longshore drift",hook:"How beaches move sideways.",
  beats:["Waves hit the beach at an angle (swash).","Backwash pulls straight down the slope.","Material zig-zags along the coast.","Builds spits and shifts beaches."],
  transcript:"Longshore drift moves sediment along a coast. Swash carries material up the beach at the angle of the wind, while backwash drags it straight back down under gravity. The repeated zig-zag transports sediment, forming features like spits.",
  note:"Longshore drift: angled swash + straight backwash = zig-zag transport along the coast.",
  quiz:{q:"Backwash moves material…",opts:["At the wind's angle","Straight down the beach","Out to sea horizontally"],answer:1,exp:"Backwash returns straight down the slope under gravity, creating the zig-zag."}}),
L({id:"geo-rainforest",subject:"geog",topic:"Ecosystems",title:"Tropical rainforest adaptations",hook:"How life survives the wet and the gloom.",
  beats:["Tall trees grow fast to reach light (emergents).","Drip-tips shed heavy rain off leaves.","Buttress roots support huge trunks.","Lianas climb others to reach the canopy."],
  transcript:"Rainforest plants adapt to heavy rain and competition for light. Drip-tip leaves shed water to prevent rot, buttress roots stabilise tall trees in thin soils, and lianas climb trunks to reach the sunlit canopy.",
  note:"Adaptations: drip-tips (shed rain), buttress roots (support), lianas (reach light).",
  quiz:{q:"What is the purpose of a drip-tip leaf?",opts:["To store water","To shed heavy rain","To attract insects"],answer:1,exp:"Drip-tips channel rain off quickly so leaves don't rot."}}),
L({id:"geo-dev",subject:"geog",topic:"Development",title:"Measuring development",hook:"Is GDP enough? No.",
  beats:["GDP per capita measures wealth — but not wellbeing.","HDI combines income, education and life expectancy.","Single measures can mislead (e.g. oil states).","HDI gives a fuller picture of quality of life."],
  transcript:"Development can be measured economically with GDP per capita, but money alone misses wellbeing. The Human Development Index (HDI) combines income, education and life expectancy into one score, giving a more rounded measure of quality of life.",
  note:"HDI = income + education + life expectancy. Broader than GDP alone.",
  quiz:{q:"HDI combines income, life expectancy and…",opts:["Population","Education","Area"],answer:1,exp:"HDI blends income, life expectancy and education."}}),

L({id:"cc-xenia",subject:"classciv",topic:"The Odyssey",title:"Xenia: guest-friendship",hook:"The sacred rule that drives the Odyssey.",
  beats:["Xenia = the duty of hospitality to strangers.","Hosts feed and shelter guests; guests don't abuse it.","Breaking xenia angers the gods.","Many episodes test good vs bad hosts."],
  transcript:"Xenia is the ancient Greek code of guest-friendship: hosts must welcome, feed and protect strangers, and guests must not exploit that welcome. It is protected by Zeus, and much of the Odyssey contrasts good hosts with those who violate xenia.",

  quiz:{q:"Xenia in the Odyssey refers to…",opts:["Revenge","Guest-friendship/hospitality","Sea travel"],answer:1,exp:"Xenia is the sacred code of hospitality between host and guest."}}),
L({id:"cc-nostos",subject:"classciv",topic:"The Odyssey",title:"Nostos & kleos",hook:"Two words at the heart of Homer.",
  beats:["Nostos = homecoming, the goal of Odysseus.","Kleos = glory or fame won through deeds.","Heroes weigh safe return against lasting fame.","Both shape Odysseus' choices."],
  transcript:"Two Greek ideas drive Homeric heroes: nostos, the longed-for homecoming, and kleos, the glory or reputation earned by great deeds. Odysseus' journey is a tension between achieving nostos and the kleos he gains along the way.",
  note:"Nostos = homecoming. Kleos = glory/fame from deeds.",
  quiz:{q:"'Nostos' means…",opts:["Glory","Homecoming","Hospitality"],answer:1,exp:"Nostos is the theme of homecoming central to the Odyssey."}}),

/* ---------------- COMPUTER SCIENCE ---------------- */
L({id:"cs-cpu",subject:"compsci",topic:"Systems architecture",title:"The fetch-execute cycle",hook:"How the CPU runs every program.",
  beats:["Fetch the next instruction from memory.","Decode what it means.","Execute it.","Repeat — billions of times a second."],
  transcript:"The CPU continuously runs the fetch-decode-execute cycle: it fetches the next instruction from memory, decodes it, then executes it. The control unit directs this, the ALU does calculations, and registers hold data being worked on.",
  note:"CPU cycle: Fetch → Decode → Execute, repeated continuously.",
  quiz:{q:"What is the first stage of the cycle?",opts:["Execute","Fetch","Decode"],answer:1,exp:"The CPU fetches the instruction first, then decodes and executes."}}),
L({id:"cs-binary",subject:"compsci",topic:"Data representation",title:"Why computers use binary",hook:"Everything is 1s and 0s.",
  beats:["Computers store data as binary (base 2).","Each digit is a bit: on (1) or off (0).","8 bits = 1 byte.","Hex (base 16) is a shorthand for binary."],
  transcript:"Computers represent all data in binary because transistors are either on or off. Each binary digit is a bit; eight bits make a byte. Hexadecimal (base 16) is a compact way to write long binary numbers.",
  note:"Binary = base 2; 1 bit = on/off; 8 bits = 1 byte; hex = base 16 shorthand.",
  quiz:{q:"How many bits are in a byte?",opts:["4","8","16"],answer:1,exp:"One byte is 8 bits."}}),
L({id:"cs-search",subject:"compsci",topic:"Algorithms",title:"Linear vs binary search",hook:"Two ways to find an item — one much faster.",
  beats:["Linear search checks each item in turn.","Works on any list, but can be slow.","Binary search repeatedly halves a sorted list.","Binary needs the data sorted first."],
  transcript:"Linear search checks items one by one and works on any list. Binary search is far faster, repeatedly halving the search range, but the list must be sorted first. Choosing the right algorithm is a core computational-thinking skill.",
  note:"Linear = check each (any list). Binary = halve a SORTED list (faster).",
  quiz:{q:"Binary search requires the list to be…",opts:["Sorted","Reversed","Empty"],answer:0,exp:"Binary search only works on a sorted list."}}),
L({id:"cs-bool",subject:"compsci",topic:"Boolean logic",title:"AND, OR, NOT",hook:"The three logic gates behind everything.",
  beats:["AND: true only if both inputs are true.","OR: true if at least one input is true.","NOT: flips the input.","Combine them to build any circuit."],
  transcript:"Boolean logic uses three core gates: AND outputs true only when both inputs are true; OR outputs true if either input is true; NOT inverts the input. Truth tables map every combination, and these gates build all digital circuits.",
  note:"AND = both true · OR = at least one true · NOT = inverts.",
  quiz:{q:"An AND gate outputs true when…",opts:["Either input is true","Both inputs are true","Neither input is true"],answer:1,exp:"AND is true only when both inputs are true."}}),

L({id:"fr-perfect",subject:"french",topic:"Grammar",title:"French: the perfect tense",hook:"Talk about the past with avoir + past participle.",
  beats:["Most verbs: use 'avoir' + past participle.","-er verbs → -é (mangé), -ir → -i, -re → -u.","'J'ai mangé' = I ate / I have eaten.","Some verbs (movement) use 'être' instead."],
  transcript:"The French perfect tense (passé composé) describes completed past actions. Most verbs use the present tense of avoir plus a past participle: -er verbs end -é, -ir end -i, -re end -u. A set of movement and reflexive verbs use être instead, and then the participle agrees.",
  note:"Perfect tense: avoir (or être) + past participle. -er→é, -ir→i, -re→u.",
  quiz:{q:"'J'ai ___' (manger, to eat). The participle is…",opts:["mangé","mangi","mangu"],answer:0,exp:"-er verbs form the participle with -é: mangé."}}),
L({id:"es-serestar",subject:"spanish",topic:"Grammar",title:"Spanish: ser vs estar",hook:"Two verbs for 'to be' — pick the right one.",
  beats:["'Ser' = permanent traits and identity.","'Estar' = temporary states and location.","Soy alta (I am tall) → ser.","Estoy cansada (I am tired) → estar."],
  transcript:"Spanish has two verbs for 'to be'. Use ser for permanent characteristics, identity and time. Use estar for temporary states, feelings and location. A handy hint: DOCTOR for ser, PLACE for estar.",
  note:"Ser = permanent/identity. Estar = temporary state/location.",
  quiz:{q:"'I am tired' (temporary) uses…",opts:["ser","estar","tener"],answer:1,exp:"Temporary states use estar: estoy cansado/a."}}),
L({id:"de-word",subject:"german",topic:"Grammar",title:"German: verb second",hook:"The golden rule of German word order.",
  beats:["In main clauses, the verb is the second idea.","'Heute spiele ich Tennis' — verb (spiele) is 2nd.","The subject can move, the verb stays put.","Time–Manner–Place orders the rest."],
  transcript:"German main clauses follow the verb-second rule: the conjugated verb is always the second element. If you start with a time phrase, the subject moves after the verb. The remaining details follow Time–Manner–Place order.",

  quiz:{q:"In 'Heute spiele ich Tennis', why is 'spiele' second?",opts:["German verb-second rule","It's a question","By accident"],answer:0,exp:"German main clauses always place the verb as the second element."}}),
L({id:"la-cases",subject:"latin",topic:"Language & grammar",title:"Latin: noun cases",hook:"Endings, not word order, carry meaning.",
  beats:["Nominative = the subject (doing the verb).","Accusative = the object (receiving it).","Genitive = 'of' (possession).","The ending tells you the job, not the position."],

  quiz:{q:"Which case marks the subject of a verb?",opts:["Accusative","Nominative","Genitive"],answer:1,exp:"The nominative case marks the subject."}}),

       ]},
     { h:"Factors affecting resistance", te:{
       t:"The resistance of a wire depends on its length, cross-sectional area, material and temperature.",
       e:"Longer, thinner, hotter wires resist current more.",
       ev:"In the required practical, varying the length of a wire and measuring R shows the pattern.",
       va:"For a fair test, control the other variables (same material, thickness, temperature).",
       l:"Explains the design of heating elements and low-resistance connecting wires." },
       subs:[
        { h:"Length", te:{
          t:"Resistance is directly proportional to length.",
          e:"Electrons collide with more ions along a longer path.",
          ev:"Doubling the length doubles the resistance (R ∝ L) — a straight line through the origin on an R-L graph.",
          va:"This is the key required-practical result; connecting wires are kept short to minimise resistance.",
          l:"Links directly to the Ohm's-law measuring method." }},
        { h:"Cross-sectional area", te:{
          t:"Resistance is inversely proportional to cross-sectional area.",
          e:"A thicker wire gives electrons more room, so fewer collisions.",
          ev:"Doubling the area halves the resistance.",
          va:"Explains why thick cables can carry large currents safely.",
          l:"Relevant to choosing safe mains cabling." }},
        { h:"Temperature", te:{
          t:"For most metals, resistance increases with temperature.",
          e:"Hotter metal ions vibrate more and impede the flow of electrons.",
          ev:"Seen in the filament-lamp graph; a thermistor does the opposite.",
          va:"Keep currents low and brief in experiments to stop the wire heating and skewing results.",
          l:"Leads into thermistors as temperature sensors." }},
        { h:"Material", te:{
          t:"Different materials have different resistances.",
          e:"This depends on how freely electrons move within them.",
          ev:"Copper has low resistance (used for wires); nichrome has high resistance (used for heating elements).",
          va:"Material choice is a design decision based on the job required.",
          l:"Connects circuit theory to real component design." }},
       ]},
     { h:"Resistors in series and parallel", te:{
       t:"The total resistance of a circuit depends on how the resistors are arranged.",
       e:"Series adds resistance; parallel reduces it.",
       ev:"Series: R = R₁ + R₂ + …  Parallel: total is less than the smallest branch.",
       va:"A frequent exam slip is treating parallel like series — the total must drop, not rise.",
       l:"Determines how household and component circuits behave." },
       subs:[
        { h:"Series", te:{
          t:"In series, resistances add up.",
          e:"Current passes through each resistor in turn, so total opposition increases.",
          ev:"Two 4 Ω resistors in series give 8 Ω. The current is the same everywhere; the voltages add up to the supply.",
          va:"Adding more components in series increases total resistance and dims them.",
          l:"Explains single-loop circuits like old fairy-light chains." }},
        { h:"Parallel", te:{
          t:"In parallel, total resistance is less than the smallest single resistor.",
          e:"Extra branches give current more routes, so overall resistance falls.",
          ev:"Two equal resistors in parallel give half the value. Voltage is the same across each branch; branch currents add.",
          va:"Home wiring is parallel so every device gets the full mains voltage and can switch independently.",
          l:"Explains household ring-main circuits." }},
       ]},
     { h:"Thermistors and LDRs", te:{
       t:"Thermistors and LDRs are components whose resistance changes with their surroundings.",
       e:"A thermistor's resistance falls as temperature rises; an LDR's resistance falls as light intensity rises.",
       ev:"Thermistors are used in thermostats; LDRs in automatic lights and camera light meters.",
       va:"Their behaviour is the opposite of a metal wire (whose resistance rises with temperature) — a common confusion.",
       l:"They are the basis of automatic sensing circuits." }},
     { h:"Required practical — investigating resistance", te:{
       t:"Investigate how the length of a wire affects its resistance.",
       e:"Vary the length, keep material, thickness and temperature constant, measure voltage and current, then calculate R = V ÷ I.",
       ev:"Plotting R against length gives a straight line through the origin, confirming R ∝ L.",
       va:"Use a low current for short times so the wire doesn't heat up and change its resistance.",
       l:"Demonstrates both the length factor and the Ohm's-law method together." }},
   ]},

 { id:"magnetism", title:"Magnetism", subject:"phys", icon:"🧲", blurb:"Fields, electromagnets, the motor effect and induction",
   sections:[
     { h:"Magnets and magnetic fields", te:{
       t:"Magnets have north and south poles and produce a magnetic field.",
       e:"Like poles repel and unlike poles attract; a field is the region where a magnetic force acts.",
       ev:"Field lines run from north to south outside the magnet, and closer lines mean a stronger field.",
       va:"The field is strongest at the poles; always draw the arrows pointing N to S.",
       l:"Fields underpin compasses, electromagnets, motors and generators." }},
     { h:"Permanent vs induced magnets", te:{
       t:"Permanent magnets produce their own field; induced magnets are only magnetic while in a field.",
       e:"Magnetic materials (iron, steel, nickel, cobalt) become induced magnets when placed near a magnet.",
       ev:"A paperclip stuck to a magnet can itself pick up another paperclip — induced magnetism.",
       va:"Induced magnetism is always attractive and disappears once the material leaves the field.",
       l:"Explains why magnets attract unmagnetised iron objects." }},
     { h:"The Earth's magnetic field and the compass", te:{
       t:"A compass needle points roughly towards geographic north.",
       e:"The Earth behaves like a giant bar magnet, and a compass is a tiny magnet that lines up with the field.",
       ev:"This is evidence that the Earth's core is magnetic.",
       va:"A plotting compass is also used to map the field around magnets and current-carrying wires.",
       l:"Shows magnetic fields are real, directional and useful for navigation." }},
     { h:"Electromagnetism — the field around a current", te:{
       t:"A current-carrying wire produces a magnetic field around it.",
       e:"The field only exists while the current flows, and reverses if the current reverses.",
       ev:"Iron filings and plotting compasses reveal the field pattern.",
       va:"A bigger current or shorter distance gives a stronger field.",
       l:"This is the link between electricity and magnetism that makes electromagnets possible." },
       subs:[
        { h:"Field around a straight wire", te:{
          t:"A straight current-carrying wire creates concentric circular field lines.",
          e:"The direction is given by the right-hand grip rule and reverses with the current.",
          ev:"Plotting compasses around the wire arrange themselves in circles.",
          va:"Strength increases with current and decreases with distance from the wire.",
          l:"Coiling the wire builds on this to make a solenoid." }},
        { h:"Solenoid (coil)", te:{
          t:"A solenoid is a coil of wire whose field resembles a bar magnet's.",
          e:"The field inside is strong and uniform, and the ends act as north and south poles.",
          ev:"Adding an iron core greatly increases the field strength, making an electromagnet.",
          va:"Strength is increased by more turns, a larger current, or an iron core.",
          l:"Directly leads to the electromagnet and its uses." }},
       ]},
     { h:"Electromagnets and their uses", te:{
       t:"An electromagnet is a solenoid with an iron core that can be switched on and off.",
       e:"Its magnetic field only exists while current flows.",
       ev:"Used in scrapyard cranes, electric bells, relays and maglev trains.",
       va:"Its advantage over a permanent magnet is that it can be switched on and off and varied in strength.",
       l:"Controllable magnetism is what makes motors and many devices possible." }},
     { h:"The motor effect", te:{
       t:"A current-carrying wire placed in a magnetic field experiences a force.",
       e:"The wire's own field interacts with the external field and the wire is pushed.",
       ev:"The size of the force is F = B I L (flux density × current × length).",
       va:"The force is greatest when the wire is at 90° to the field, and zero when parallel to it.",
       l:"This is the basis of the electric motor and the loudspeaker." },
       subs:[
        { h:"Fleming's left-hand rule", te:{
          t:"Fleming's left-hand rule gives the direction of the force.",
          e:"Thumb shows Force/motion, first finger the Field (N to S), second finger the Current.",
          ev:"Reversing either the current or the field reverses the direction of the force.",
          va:"Use the LEFT hand for the motor effect — a common error is reaching for the right.",
          l:"It predicts which way a motor coil will turn." }},
        { h:"Calculating the force", te:{
          t:"The force is calculated with F = B I L.",
          e:"B is in tesla, I in amps and L in metres.",
          ev:"With B = 0.5 T, I = 2 A, L = 0.1 m: F = 0.5 × 2 × 0.1 = 0.1 N.",
          va:"The equation only applies when the wire is perpendicular to the field.",
          l:"Lets you design and compare motor strengths quantitatively." }},
       ]},
     { h:"The electric motor", te:{
       t:"A motor uses the motor effect to spin a coil continuously.",
       e:"Forces act in opposite directions on opposite sides of the coil, creating a turning effect.",
       ev:"A split-ring commutator reverses the current every half-turn so the coil keeps rotating the same way.",
       va:"Without the commutator the coil would just rock back and forth instead of spinning.",
       l:"Converts electrical energy to kinetic energy in countless everyday devices." }},
     { h:"Electromagnetic induction (Higher)", te:{
       t:"A changing magnetic field through a conductor induces a potential difference.",
       e:"Moving a magnet near a coil, or a coil through a field, generates a voltage.",
       ev:"The induced p.d. is larger with faster movement, more turns, or a stronger magnet.",
       va:"This is the reverse of the motor effect — movement produces electricity rather than the other way round.",
       l:"It is the principle behind generators and transformers." },
       subs:[
        { h:"The generator", te:{
          t:"A generator induces a current by rotating a coil in a magnetic field.",
          e:"As the coil cuts through field lines, an alternating current is induced.",
          ev:"Slip rings give an a.c. output that looks like a sine wave.",
          va:"Faster rotation increases both the frequency and the peak voltage.",
          l:"This is how mains electricity is generated in power stations." }},
        { h:"The transformer", te:{
          t:"A transformer changes the size of an alternating voltage.",
          e:"Alternating current in the primary coil makes a changing field in the iron core, inducing a voltage in the secondary coil.",
          ev:"Vp ÷ Vs = Np ÷ Ns; a step-up transformer has more turns on the secondary.",
          va:"Transformers only work with a.c., and ideal ones assume Vp Ip = Vs Is (100% efficient).",
          l:"They let the National Grid transmit power at high voltage to reduce energy losses." }},
       ]},
   ]},

 { id:"lifediversity", title:"Life diversity", subject:"bio", icon:"🌿", blurb:"Variation, evolution, classification and biodiversity",
   sections:[
     { h:"Variation", te:{
       t:"Variation is the differences between individuals of a species.",
       e:"It is caused by genes, the environment, or a combination of both.",
       ev:"Eye colour is genetic, a scar is environmental, and height is influenced by both.",
       va:"Variation can be continuous (a range, like height) or discontinuous (distinct groups, like blood type).",
       l:"Variation is the raw material that natural selection acts on." },
       subs:[
        { h:"Genetic variation", te:{
          t:"Genetic variation comes from different alleles.",
          e:"It arises through mutations and the mixing of alleles in sexual reproduction.",
          ev:"Mutations are random changes in DNA; most are neutral, a few harmful, occasionally one is beneficial.",
          va:"Only genetic variation is inherited, so only it can drive evolution.",
          l:"Beneficial alleles are selected for over generations." }},
        { h:"Environmental variation", te:{
          t:"Environmental variation is caused by surroundings, not genes.",
          e:"Diet, climate and lifestyle all shape characteristics.",
          ev:"A plant grown in shade grows tall and spindly reaching for light.",
          va:"This type of variation is not passed on to offspring.",
          l:"It captures the 'nurture' side of the nature-nurture distinction." }},
       ]},
     { h:"Evolution by natural selection", te:{
       t:"Species change over time through natural selection, as proposed by Darwin.",
       e:"Individuals with advantageous variations are more likely to survive, reproduce and pass on their alleles.",
       ev:"The steps are: variation, competition, survival of the best-suited, inheritance, repeated over many generations.",
       va:"'Survival of the fittest' means best-suited to the environment, not the strongest or fastest.",
       l:"It explains how all of life's diversity arose from common ancestors." }},
     { h:"Evidence for evolution", te:{
       t:"Several independent lines of evidence support evolution.",
       e:"The strongest at GCSE are the fossil record and antibiotic resistance.",
       ev:"Both show change in organisms over time, one slow and one fast.",
       va:"Each has limitations, but together they make evolution very well supported.",
       l:"They turn evolution from a theory into an evidenced explanation." },
       subs:[
        { h:"Fossils", te:{
          t:"Fossils show how organisms have changed over millions of years.",
          e:"They form from hard parts, casts or preservation where decay is prevented.",
          ev:"The fossil record reveals gradual change, such as the evolution of the horse.",
          va:"The record is incomplete because soft-bodied organisms rarely fossilise and many traces are destroyed.",
          l:"It provides a long-term timeline of life on Earth." }},
        { h:"Antibiotic resistance", te:{
          t:"Bacteria evolving antibiotic resistance is natural selection we can observe directly.",
          e:"A chance mutation makes some bacteria resistant; antibiotics kill the rest, so the resistant ones survive and multiply.",
          ev:"MRSA is a well-known resistant 'superbug'.",
          va:"It is slowed by finishing antibiotic courses and not overusing them.",
          l:"It is a fast, real-world demonstration of evolution in action." }},
       ]},
     { h:"Selective breeding", te:{
       t:"Selective breeding is humans choosing which organisms reproduce to get desired traits.",
       e:"Parents with the wanted characteristic are bred together, and this is repeated over many generations.",
       ev:"Used to produce high-yield crops, productive livestock and particular dog breeds.",
       va:"It reduces genetic variation, leading to inbreeding and greater vulnerability to disease.",
       l:"It is an artificial, human-directed version of natural selection." }},
     { h:"Genetic engineering", te:{
       t:"Genetic engineering transfers a gene from one organism into another.",
       e:"A desired gene is cut out and inserted into the genome of a different organism.",
       ev:"Bacteria are engineered to make human insulin, and crops are modified to resist pests.",
       va:"It offers benefits like higher yields and medicines, but raises ethical and ecological concerns.",
       l:"It is a faster, more precise alternative to selective breeding." }},
     { h:"Classification", te:{
       t:"Classification organises living things into related groups.",
       e:"Early systems used physical structure; modern ones use genetics.",
       ev:"The Linnaean hierarchy and the three-domain system are the key examples.",
       va:"Improved technology has refined classification, showing science updates with new evidence.",
       l:"It gives biologists a shared, evolutionary framework." },
       subs:[
        { h:"The Linnaean system", te:{
          t:"Linnaeus grouped organisms by structure into a hierarchy.",
          e:"The levels are Kingdom, Phylum, Class, Order, Family, Genus, Species.",
          ev:"The binomial name combines genus and species, e.g. Homo sapiens.",
          va:"Correct conventions (capital genus, lower-case species, italics) often carry marks.",
          l:"It created a common naming language used worldwide." }},
        { h:"The three domains", te:{
          t:"Woese proposed three domains using genetic analysis.",
          e:"They are Archaea, Bacteria and Eukaryota.",
          ev:"The grouping is based on RNA and DNA differences not visible in structure.",
          va:"It shows how new evidence (genetics) can overturn older, structure-based models.",
          l:"It better reflects true evolutionary relationships." }},
       ]},
     { h:"Biodiversity and its importance", te:{
       t:"Biodiversity is the variety of all living things in an ecosystem.",
       e:"High biodiversity makes ecosystems more stable and resilient to change.",
       ev:"Food webs with many species cope better when one species is lost.",
       va:"Human activities such as deforestation, pollution and climate change reduce biodiversity.",
       l:"Protecting it safeguards the ecosystem services that humans depend on." }},
     { h:"Maintaining biodiversity", te:{
       t:"Conservation measures aim to protect biodiversity.",
       e:"These include breeding programmes, protected areas, reduced deforestation and recycling.",
       ev:"Examples are field margins, hedgerow protection and reforestation schemes.",
       va:"There is often a conflict between conservation and economic or food-production needs.",
       l:"It connects biology directly to environmental policy and choices." }},
   ]},

 { id:"periodictable", title:"Periodic table", subject:"chem", icon:"⚗️", blurb:"Its development, structure, and the trends in groups 1, 7 and 0",
   sections:[
     { h:"Development of the periodic table", te:{
       t:"The modern table developed from earlier attempts, especially Mendeleev's.",
       e:"Mendeleev arranged elements by atomic mass but left gaps for undiscovered elements and swapped some pairs to fit properties.",
       ev:"He predicted the properties of missing elements such as germanium, later confirmed.",
       va:"The table is now ordered by atomic (proton) number, which removed the anomalies once protons were discovered.",
       l:"It is a clear example of how scientific models improve with new evidence." }},
     { h:"Structure: groups and periods", te:{
       t:"The table is arranged in groups (columns) and periods (rows).",
       e:"The group number equals the number of outer-shell electrons; the period number equals the number of occupied shells.",
       ev:"Group 1 elements have 1 outer electron; period 3 elements have 3 electron shells.",
       va:"Elements in the same group react similarly because they have the same number of outer electrons.",
       l:"Outer-shell electrons explain all the reactivity trends that follow." }},
     { h:"Metals and non-metals", te:{
       t:"Metals sit on the left and centre, non-metals on the right.",
       e:"Metals lose electrons to form positive ions; non-metals gain or share electrons.",
       ev:"Metals conduct, are malleable and shiny; non-metals are often brittle and insulating.",
       va:"A staircase line separates them, and a few 'metalloids' sit in between with mixed properties.",
       l:"Whether elements are metals or non-metals decides their bonding type." }},
     { h:"Group 1 — the alkali metals", te:{
       t:"Group 1 metals are very reactive and become more reactive down the group.",
       e:"They each have 1 outer electron, which is lost easily; further down, that electron is further from the nucleus and lost even more easily.",
       ev:"Lithium, sodium and potassium react with water to give a metal hydroxide and hydrogen, increasingly vigorously.",
       va:"Their downward increase in reactivity is the reverse of Group 7 — a classic exam contrast.",
       l:"It shows directly how electron arrangement drives reactivity." }},
     { h:"Group 7 — the halogens", te:{
       t:"Group 7 non-metals become less reactive down the group.",
       e:"They gain 1 electron to react; lower down, the outer shell is further from the nucleus, so attracting an electron is harder.",
       ev:"A more reactive halogen displaces a less reactive one from a solution of its salt (displacement).",
       va:"Melting and boiling points rise down the group, with states changing gas → liquid → solid.",
       l:"The opposite trend to Group 1, both explained by electron-shell distance." }},
     { h:"Group 0 — the noble gases", te:{
       t:"Group 0 gases are very unreactive (inert).",
       e:"They have full outer electron shells, so no tendency to gain, lose or share electrons.",
       ev:"Helium fills balloons and argon fills light bulbs, both chosen for being inert.",
       va:"Their boiling points increase down the group as the atoms get larger.",
       l:"Full shells explain why other elements react at all — to reach the same stable arrangement." }},
     { h:"Transition metals", te:{
       t:"Transition metals in the central block differ from Group 1 metals.",
       e:"They are harder, denser and much less reactive, with higher melting points.",
       ev:"They form coloured compounds, have ions with more than one charge (e.g. Fe²⁺ and Fe³⁺) and act as catalysts (e.g. iron in the Haber process).",
       va:"They react slowly or not at all with water, unlike the vigorous alkali metals.",
       l:"Their properties make them ideal structural metals and industrial catalysts." }},
   ]},

 { id:"nutrients", title:"Nutrients", subject:"bio", icon:"🥗", blurb:"The nutrient groups, a balanced diet, and the food tests",
   sections:[
     { h:"Carbohydrates", te:{
       t:"Carbohydrates are the body's main energy source.",
       e:"They are made of simple sugars such as glucose, joined into starch and complex carbohydrates.",
       ev:"Found in bread, pasta and rice; they release about 17 kJ per gram.",
       va:"Excess carbohydrate is stored as glycogen or converted to fat.",
       l:"Glucose is the fuel used in respiration to release energy." }},
     { h:"Proteins", te:{
       t:"Proteins are needed for growth and repair of tissue.",
       e:"They are built from amino acids and also form enzymes, hormones and antibodies.",
       ev:"Good sources include meat, fish, eggs, beans and pulses.",
       va:"They are not stored long-term, so a regular supply is needed; severe deficiency causes kwashiorkor.",
       l:"All enzymes are proteins, so they control the body's metabolism." }},
     { h:"Lipids (fats and oils)", te:{
       t:"Lipids store energy and insulate the body.",
       e:"They are made of fatty acids and glycerol.",
       ev:"They provide about 39 kJ per gram, more than twice carbohydrates, and are found in butter, oils and nuts.",
       va:"They are needed in moderation; too much saturated fat is linked to heart disease.",
       l:"They also form cell membranes and cushion organs." }},
     { h:"Vitamins", te:{
       t:"Vitamins are needed in tiny amounts to stay healthy.",
       e:"Each vitamin has a specific role, and a lack of one causes a deficiency disease.",
       ev:"Key examples for GCSE are vitamins A, C and D.",
       va:"Water-soluble vitamins are not stored, so they are needed more regularly.",
       l:"They work alongside minerals to keep body systems functioning." },
       subs:[
        { h:"Vitamin C", te:{
          t:"Vitamin C is needed for healthy skin and tissue repair.",
          e:"It helps the body make connective tissue.",
          ev:"Found in citrus fruit and vegetables; a deficiency causes scurvy.",
          va:"It is water-soluble and not stored, so it must be eaten regularly.",
          l:"Historically linked to sailors who lacked fresh fruit." }},
        { h:"Vitamin D", te:{
          t:"Vitamin D helps the body absorb calcium for bones.",
          e:"It is made in the skin in sunlight and also found in oily fish.",
          ev:"A deficiency causes rickets, where children's bones become soft and bend.",
          va:"People with little sun exposure may need it from food or supplements.",
          l:"It works together with the mineral calcium." }},
        { h:"Vitamin A", te:{
          t:"Vitamin A is needed for vision and a healthy immune system.",
          e:"The body can make it from carotene in some foods.",
          ev:"Found in liver and carrots; a deficiency causes night blindness.",
          va:"It can be stored in the liver, so it is not needed every single day.",
          l:"It links diet directly to the working of the eye." }},
       ]},
     { h:"Minerals", te:{
       t:"Minerals are inorganic nutrients needed in small amounts.",
       e:"Each has a specific role, and a shortage causes a deficiency.",
       ev:"Iron and calcium are the key GCSE examples.",
       va:"They are needed in much smaller amounts than carbohydrates, proteins or fats.",
       l:"They support the blood, bones and many cell processes." },
       subs:[
        { h:"Iron", te:{
          t:"Iron is needed to make haemoglobin in red blood cells.",
          e:"Haemoglobin is the molecule that carries oxygen around the body.",
          ev:"Found in red meat and leafy greens; a deficiency causes anaemia and tiredness.",
          va:"Demand rises during growth and for people who menstruate.",
          l:"It connects diet to the circulatory system." }},
        { h:"Calcium", te:{
          t:"Calcium is needed for strong bones and teeth.",
          e:"It also helps blood clotting and muscle contraction.",
          ev:"Found in dairy products; a shortage weakens bones.",
          va:"Its absorption depends on having enough vitamin D.",
          l:"Diet, vitamins and the skeleton are all linked here." }},
       ]},
     { h:"Water and fibre", te:{
       t:"Water and fibre keep the body and digestion working healthily.",
       e:"Water is the solvent for reactions and transport; fibre adds bulk that moves food through the gut.",
       ev:"Fibre from wholegrains and vegetables prevents constipation, and about 60% of the body is water.",
       va:"Fibre is not actually digested, yet it is still essential for gut health.",
       l:"Both support the digestive system and overall function." }},
     { h:"A balanced diet and energy", te:{
       t:"A balanced diet contains the right amounts of every nutrient group.",
       e:"Energy needs vary with age, sex, activity level and pregnancy.",
       ev:"Too much energy leads to obesity, too little to starvation, and missing nutrients to deficiency diseases.",
       va:"'Balanced' is individual — an athlete needs far more energy than someone sedentary.",
       l:"Diet directly affects long-term health and disease risk." }},
     { h:"Required practical — food tests", te:{
       t:"Chemical tests identify which nutrients a food contains.",
       e:"Each test uses a specific reagent and gives a characteristic colour change.",
       ev:"Iodine, Benedict's, biuret and the emulsion test cover the main nutrient groups.",
       va:"Benedict's is semi-quantitative — the final colour indicates how much sugar is present.",
       l:"It applies nutrient knowledge in a practical, testable way." },
       subs:[
        { h:"Starch — iodine test", te:{
          t:"Iodine solution tests for starch.",
          e:"A few drops of iodine are added to the sample.",
          ev:"It turns from orange-brown to blue-black if starch is present.",
          va:"A clear, reliable colour change makes it a favourite exam test.",
          l:"Detects a key carbohydrate." }},
        { h:"Sugars — Benedict's test", te:{
          t:"Benedict's solution tests for reducing sugars such as glucose.",
          e:"Benedict's is added and the sample is heated in a water bath.",
          ev:"It changes from blue to green, yellow, orange or brick-red as sugar increases.",
          va:"The colour roughly shows how much sugar is present, making it semi-quantitative.",
          l:"Links to carbohydrates and energy." }},
        { h:"Protein — biuret test", te:{
          t:"Biuret reagent tests for protein.",
          e:"Biuret solution is added to the sample at room temperature.",
          ev:"It turns from blue to purple or lilac if protein is present.",
          va:"No heating is needed, unlike the Benedict's test.",
          l:"Identifies the growth-and-repair nutrient." }},
        { h:"Lipids — emulsion test", te:{
          t:"The emulsion (ethanol) test detects lipids.",
          e:"The sample is mixed with ethanol and then added to water.",
          ev:"A cloudy white emulsion forms if a lipid is present.",
          va:"A clear solution means no lipid was detected.",
          l:"Completes the set of four nutrient tests." }},
       ]},
   ]},

 { id:"lightwaves", title:"Light and waves", subject:"phys", icon:"🌈", blurb:"Wave properties, the wave equation, reflection, refraction and the EM spectrum",
   sections:[
     { h:"Describing waves", te:{
       t:"Waves transfer energy without transferring matter.",
       e:"The medium vibrates as the wave passes, but it does not travel along with the wave.",
       ev:"A floating cork bobs up and down as a water wave moves past it.",
       va:"The key idea, often tested, is that energy moves while matter stays put.",
       l:"This applies to every type of wave." },
       subs:[
        { h:"Transverse vs longitudinal", te:{
          t:"Waves are either transverse or longitudinal.",
          e:"Transverse waves vibrate perpendicular to their travel; longitudinal waves vibrate parallel, with compressions and rarefactions.",
          ev:"Light and all electromagnetic waves are transverse, while sound is longitudinal.",
          va:"Remembering that all EM waves are transverse is a common exam fact.",
          l:"The type determines how each wave behaves and travels." }},
        { h:"Wave properties", te:{
          t:"Waves are described by amplitude, wavelength, frequency and period.",
          e:"Amplitude is the maximum displacement (linked to energy); wavelength is one full wave; frequency is waves per second in hertz; period is the time for one wave.",
          ev:"Period and frequency are linked by T = 1 ÷ f.",
          va:"A bigger amplitude carries more energy; don't confuse amplitude with wavelength.",
          l:"These quantities feed directly into the wave equation." }},
       ]},
     { h:"The wave equation", te:{
       t:"Wave speed equals frequency multiplied by wavelength.",
       e:"In symbols, v = f λ, with v in m/s, f in Hz and λ in metres.",
       ev:"A wave with f = 50 Hz and λ = 2 m travels at v = 50 × 2 = 100 m/s.",
       va:"All EM waves travel at the same speed in a vacuum, about 3 × 10⁸ m/s.",
       l:"It connects frequency and wavelength right across the EM spectrum." }},
     { h:"Reflection", te:{
       t:"Reflection is when a wave bounces off a surface.",
       e:"The angle of incidence equals the angle of reflection, both measured from the normal.",
       ev:"A flat mirror gives clear (specular) reflection; a rough surface gives scattered (diffuse) reflection.",
       va:"Even diffuse reflection obeys the law of reflection at each individual point.",
       l:"It explains mirrors and why we can see objects at all." }},
     { h:"Refraction", te:{
       t:"Refraction is the bending of a wave as it changes speed entering a new medium.",
       e:"Light slows and bends towards the normal entering a denser medium, and bends away on leaving.",
       ev:"A straw looks bent in a glass of water, and a prism splits white light into colours.",
       va:"The speed and wavelength change, but the frequency stays the same.",
       l:"It is the basis of lenses and the dispersion of light into a spectrum." }},
     { h:"The electromagnetic spectrum", te:{

const REVISION_BY_ID=Object.fromEntries(REVISION.map(r=>[r.id,r]));

const KEY="bellas_brain_v1";
function blankEng(){ return {views:0, rewatches:0, watchMs:0, completed:0, liked:false, saved:false, skipped:0, quizAttempts:0, quizCorrect:0, comments:[]}; }
function defaultState(){ return {
  profile:{ name:"", clipGoal:8, onboarded:false },
  eng:{}, settings:{ calm:false, motion:1, font:"normal", breaks:true },
  session:{ completedToday:0, date:todayStr() }, stats:{ totalCompleted:0 },
}; }
function load(){ try{ const r=localStorage.getItem(KEY); if(!r) return defaultState(); const s=JSON.parse(r); const d=defaultState();
  return {...d,...s, profile:{...d.profile,...s.profile}, settings:{...d.settings,...s.settings}, session:{...d.session,...s.session}, stats:{...d.stats,...s.stats}, eng:s.eng||{}}; }catch(e){ return defaultState(); } }
function save(s){ try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){} }

function engOf(state,id){ return state.eng[id]||blankEng(); }
function affinity(e){ return (e.liked?3:0)+(e.saved?4:0)+(e.completed>0?2:0)+Math.min(4,e.watchMs/30000)+e.quizCorrect*1.5+e.rewatches*1.5; }
function gap(e){ if(e.views===0) return 0.55; const wr=e.quizAttempts?(e.quizAttempts-e.quizCorrect)/e.quizAttempts:0.4; const inc=e.completed>0?0:0.5; const sk=clamp(e.skipped*0.25,0,0.6); return clamp(wr*0.55+inc*0.25+sk*0.2,0,1); }
function topicAggregates(state){ const map={};
  LESSONS.forEach(l=>{ const k=l.subject+"||"+l.topic; if(!map[k]) map[k]={subject:l.subject,topic:l.topic,lessons:[],aff:0,gp:0,seen:0,correct:0,attempts:0};
    const e=engOf(state,l.id); map[k].lessons.push(l.id); map[k].aff+=affinity(e); map[k].gp+=gap(e); map[k].seen+=e.views>0?1:0; map[k].correct+=e.quizCorrect; map[k].attempts+=e.quizAttempts; });
  return Object.values(map).map(t=>({...t, gpAvg:t.gp/t.lessons.length, affAvg:t.aff/t.lessons.length, accuracy:t.attempts?Math.round(100*t.correct/t.attempts):null})); }
function strengths(state){ return topicAggregates(state).filter(t=>t.seen>0).sort((a,b)=>b.affAvg-a.affAvg).slice(0,3); }
function focusAreas(state){ return topicAggregates(state).sort((a,b)=>b.gpAvg-a.gpAvg).filter(t=>t.gpAvg>0.35).slice(0,5); }
function forYouQueue(state){ const scored=LESSONS.map(l=>{ const e=engOf(state,l.id); return {id:l.id,subject:l.subject,g:gap(e),seen:e.views>0,mastered:e.completed>0&&e.quizCorrect>0}; });
  scored.forEach(s=>{ s.w=s.g*2+(s.seen?0:1.2)+(s.mastered?-1:0)+Math.random()*0.5; }); scored.sort((a,b)=>b.w-a.w);
  const out=[],buckets={}; scored.forEach(s=>{ (buckets[s.subject]=buckets[s.subject]||[]).push(s.id); }); const keys=Object.keys(buckets); let added=true;
  while(added){ added=false; for(const k of keys){ if(buckets[k].length){ out.push(buckets[k].shift()); added=true; } } } return out; }
function pathwayQueue(state){ const fa=focusAreas(state); const ids=[]; fa.forEach(t=>t.lessons.forEach(id=>{ if(!ids.includes(id)) ids.push(id); }));
  LESSONS.forEach(l=>{ if(engOf(state,l.id).views===0 && !ids.includes(l.id)) ids.push(l.id); }); return ids.length?ids:forYouQueue(state); }

  useEffect(()=>{ const root=scrollRef.current; if(!root) return;
    const io=new IntersectionObserver((entries)=>{ entries.forEach(en=>{ if(en.isIntersecting && en.intersectionRatio>0.6) setActiveId(en.target.dataset.id); }); },{root, threshold:[0.6]});
    Object.values(clipRefs.current).forEach(el=>el&&io.observe(el)); return ()=>io.disconnect(); },[queue]);
