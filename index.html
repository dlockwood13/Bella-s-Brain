  .tchip.has{ color:#fff; }
</style>

L({id:"ma-quad",subject:"maths",topic:"Algebra",title:"The quadratic formula",hook:"When factorising fails, this always works.",

/* ---------------- BIOLOGY ---------------- */
L({id:"bio-cell",subject:"bio",topic:"Cell biology",title:"Eukaryotic vs prokaryotic",hook:"Two cell types. One has a nucleus.",
  beats:["Eukaryotic cells (plant, animal) have a nucleus.","Prokaryotic cells (bacteria) do not — DNA is a loop.","Prokaryotes are much smaller.","Both have a membrane, cytoplasm and ribosomes."],
  transcript:"Eukaryotic cells, like animal and plant cells, keep their DNA inside a nucleus. Prokaryotic cells such as bacteria have no nucleus; their DNA floats as a single loop, sometimes with small plasmids. Prokaryotes are smaller and simpler.",
  note:"Eukaryotic = has a nucleus. Prokaryotic (bacteria) = no nucleus, DNA loop.",
  quiz:{q:"Which lacks a nucleus?",opts:["Animal cell","Bacterial cell","Plant cell"],answer:1,exp:"Bacteria are prokaryotic — no nucleus; DNA is a free loop."}}),
L({id:"bio-osmo",subject:"bio",topic:"Cell biology",title:"Osmosis vs diffusion",hook:"They sound alike. They're not.",
  beats:["Diffusion = any particles, high → low concentration.","Osmosis = water only, across a membrane.","Active transport = low → high, needs energy.","Diffusion and osmosis are passive."],
  transcript:"Diffusion is the net movement of any particles from high to low concentration. Osmosis is specifically water across a partially permeable membrane. Active transport moves substances against the gradient and needs energy from respiration.",
  note:"Diffusion = any particle. Osmosis = WATER. Active transport = against gradient + energy.",
  quiz:{q:"Which moves substances against the concentration gradient?",opts:["Diffusion","Osmosis","Active transport"],answer:2,exp:"Active transport goes low → high and requires energy."}}),
L({id:"bio-enzyme",subject:"bio",topic:"Organisation",title:"Enzymes & the lock and key",hook:"Biological catalysts with a perfect fit.",
  beats:["Enzymes speed up reactions and aren't used up.","The substrate fits the active site like a key in a lock.","Too hot or wrong pH → the enzyme denatures.","Denatured = active site changes shape, no fit."],
  transcript:"Enzymes are biological catalysts. Each has an active site shaped to fit a specific substrate — the lock and key model. Outside their optimum temperature and pH the active site changes shape and denatures, so the substrate no longer fits.",
  note:"Enzyme + substrate fit at the active site. High temp/wrong pH → denatured.",
  quiz:{q:"What happens to an enzyme that is overheated?",opts:["It speeds up forever","It denatures","It becomes a substrate"],answer:1,exp:"High temperature denatures the enzyme — the active site loses its shape."}}),
L({id:"bio-photo",subject:"bio",topic:"Bioenergetics",title:"Photosynthesis in one line",hook:"Plants make food from light.",
  beats:["CO₂ + water → glucose + oxygen.","Powered by light, absorbed by chlorophyll.","Happens in chloroplasts.","Endothermic — it takes energy in."],
  transcript:"Photosynthesis turns carbon dioxide and water into glucose and oxygen, using light energy captured by chlorophyll in chloroplasts. It is endothermic. Glucose is used for respiration, storage and growth.",
  note:"CO₂ + H₂O → glucose + O₂ (light + chlorophyll)",
  quiz:{q:"Where does photosynthesis happen?",opts:["Mitochondria","Chloroplasts","Nucleus"],answer:1,exp:"Chloroplasts contain chlorophyll, which absorbs light."}}),
L({id:"bio-resp",subject:"bio",topic:"Bioenergetics",title:"Aerobic vs anaerobic respiration",hook:"Energy with or without oxygen.",
  beats:["Aerobic: glucose + oxygen → CO₂ + water.","Releases lots of energy.","Anaerobic (muscles): glucose → lactic acid.","Anaerobic releases far less energy."],
  transcript:"Aerobic respiration uses oxygen to release energy efficiently, producing carbon dioxide and water. When oxygen runs short, muscles respire anaerobically, producing lactic acid and much less energy, which causes an oxygen debt.",
  note:"Aerobic: glucose + O₂ → CO₂ + H₂O. Anaerobic (muscle): glucose → lactic acid.",
  quiz:{q:"Anaerobic respiration in muscles produces…",opts:["Carbon dioxide only","Lactic acid","Ethanol"],answer:1,exp:"In human muscles, anaerobic respiration makes lactic acid."}}),
L({id:"bio-insulin",subject:"bio",topic:"Homeostasis",title:"Insulin & blood glucose",hook:"How the body keeps sugar steady.",
  beats:["Blood glucose too high → pancreas releases insulin.","Insulin makes the liver store glucose as glycogen.","Too low → glucagon releases glucose again.","This is negative feedback."],
  transcript:"Blood glucose is controlled by the pancreas. When it rises, insulin is released and the liver converts glucose to glycogen. When it falls, glucagon triggers the reverse. This opposing pair is negative feedback. In type 1 diabetes the pancreas makes too little insulin.",
  note:"High glucose → insulin → store as glycogen. Low → glucagon → release glucose.",
  quiz:{q:"Which hormone lowers blood glucose?",opts:["Glucagon","Insulin","Adrenaline"],answer:1,exp:"Insulin lowers blood glucose by storing it as glycogen."}}),
L({id:"bio-genetics",subject:"bio",topic:"Inheritance",title:"Dominant and recessive alleles",hook:"Why traits skip generations.",
  beats:["Alleles are versions of a gene.","Dominant (capital) shows even with one copy.","Recessive (lower case) needs two copies to show.","Punnett squares predict the ratios."],
  transcript:"Genes come in versions called alleles. A dominant allele is expressed with just one copy; a recessive allele needs two. Genotype is the alleles present; phenotype is what's shown. A Punnett square predicts offspring ratios.",
  note:"Dominant shows with one copy; recessive needs two. Genotype = alleles, phenotype = shown.",
  quiz:{q:"A recessive trait appears only when…",opts:["One recessive allele is present","Two recessive alleles are present","A dominant allele is present"],answer:1,exp:"Recessive traits need two recessive alleles."}}),

  transcript:"The pH scale runs 0–14: acids below 7, alkalis above. Neutralisation makes a salt and water. Acids react with metals to give a salt and hydrogen, and with carbonates to give a salt, water and carbon dioxide.",

L({id:"chem-rate",subject:"chem",topic:"Rates & equilibrium",title:"Speeding up reactions",hook:"Four levers control reaction rate.",

L({id:"chem-oil",subject:"chem",topic:"Organic chemistry",title:"Crude oil & fractional distillation",hook:"One mixture, many useful fuels.",

L({id:"hi-medicine",subject:"history",topic:"Medicine through time",title:"Germ theory changes everything",hook:"1861: the idea that rewired medicine.",
  beats:["Before: 'miasma' (bad air) was blamed for disease.","1861: Pasteur proved germs cause decay and disease.","Koch later linked specific microbes to specific diseases.","This opened the door to vaccines and antiseptics."],
  transcript:"For centuries disease was blamed on miasma — bad air. In 1861 Louis Pasteur's Germ Theory showed microorganisms cause disease, and Robert Koch identified specific microbes for specific illnesses. This transformed prevention, surgery and public health.",
  note:"Pasteur's Germ Theory (1861): microbes cause disease — replaced miasma theory.",

/* ============================================================
   HELPERS + PERSISTENCE + ENGINE
   ============================================================ */
const uid=()=>Math.random().toString(36).slice(2,9);
const todayStr=()=>new Date().toISOString().slice(0,10);
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const fmtTime=(ms)=>{ const m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000); return m+"m "+String(s).padStart(2,"0")+"s"; };
const sc=(k)=>`var(--s-${k}, var(--s-default))`;
const LESSON_BY_ID=Object.fromEntries(LESSONS.map(l=>[l.id,l]));

const KEY="scrolllearn_jags_v1";
function blankEng(){ return {views:0, rewatches:0, watchMs:0, completed:0, liked:false, saved:false, skipped:0, quizAttempts:0, quizCorrect:0, comments:[]}; }
function defaultState(){ return {
  profile:{ name:"", clipGoal:8, onboarded:false },
  eng:{}, settings:{ calm:false, motion:1, font:"normal", breaks:true },
  session:{ completedToday:0, date:todayStr() }, stats:{ totalCompleted:0 },
}; }
function load(){ try{ const r=localStorage.getItem(KEY); if(!r) return defaultState(); const s=JSON.parse(r); const d=defaultState();
  return {...d,...s, profile:{...d.profile,...s.profile}, settings:{...d.settings,...s.settings}, session:{...d.session,...s.session}, stats:{...d.stats,...s.stats}, eng:s.eng||{}}; }catch(e){ return defaultState(); } }
function save(s){ try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){} }

function engOf(state,id){ return state.eng[id]||blankEng(); }
function affinity(e){ return (e.liked?3:0)+(e.saved?4:0)+(e.completed>0?2:0)+Math.min(4,e.watchMs/30000)+e.quizCorrect*1.5+e.rewatches*1.5; }
function gap(e){ if(e.views===0) return 0.55; const wr=e.quizAttempts?(e.quizAttempts-e.quizCorrect)/e.quizAttempts:0.4; const inc=e.completed>0?0:0.5; const sk=clamp(e.skipped*0.25,0,0.6); return clamp(wr*0.55+inc*0.25+sk*0.2,0,1); }
function topicAggregates(state){ const map={};
  LESSONS.forEach(l=>{ const k=l.subject+"||"+l.topic; if(!map[k]) map[k]={subject:l.subject,topic:l.topic,lessons:[],aff:0,gp:0,seen:0,correct:0,attempts:0};
    const e=engOf(state,l.id); map[k].lessons.push(l.id); map[k].aff+=affinity(e); map[k].gp+=gap(e); map[k].seen+=e.views>0?1:0; map[k].correct+=e.quizCorrect; map[k].attempts+=e.quizAttempts; });
  return Object.values(map).map(t=>({...t, gpAvg:t.gp/t.lessons.length, affAvg:t.aff/t.lessons.length, accuracy:t.attempts?Math.round(100*t.correct/t.attempts):null})); }
function strengths(state){ return topicAggregates(state).filter(t=>t.seen>0).sort((a,b)=>b.affAvg-a.affAvg).slice(0,3); }
function focusAreas(state){ return topicAggregates(state).sort((a,b)=>b.gpAvg-a.gpAvg).filter(t=>t.gpAvg>0.35).slice(0,5); }
function forYouQueue(state){ const scored=LESSONS.map(l=>{ const e=engOf(state,l.id); return {id:l.id,subject:l.subject,g:gap(e),seen:e.views>0,mastered:e.completed>0&&e.quizCorrect>0}; });
  scored.forEach(s=>{ s.w=s.g*2+(s.seen?0:1.2)+(s.mastered?-1:0)+Math.random()*0.5; }); scored.sort((a,b)=>b.w-a.w);
  const out=[],buckets={}; scored.forEach(s=>{ (buckets[s.subject]=buckets[s.subject]||[]).push(s.id); }); const keys=Object.keys(buckets); let added=true;
  while(added){ added=false; for(const k of keys){ if(buckets[k].length){ out.push(buckets[k].shift()); added=true; } } } return out; }
function pathwayQueue(state){ const fa=focusAreas(state); const ids=[]; fa.forEach(t=>t.lessons.forEach(id=>{ if(!ids.includes(id)) ids.push(id); }));
  LESSONS.forEach(l=>{ if(engOf(state,l.id).views===0 && !ids.includes(l.id)) ids.push(l.id); }); return ids.length?ids:forYouQueue(state); }

function Feed({state, queue, feedMode, startId, backToForYou, mutateEng, onComplete, flash, setSheet, setView}){

  useEffect(()=>{ const root=scrollRef.current; if(!root) return;
    const io=new IntersectionObserver((entries)=>{ entries.forEach(en=>{ if(en.isIntersecting && en.intersectionRatio>0.6) setActiveId(en.target.dataset.id); }); },{root, threshold:[0.6]});
    Object.values(clipRefs.current).forEach(el=>el&&io.observe(el)); return ()=>io.disconnect(); },[queue]);
  const handleComplete=(id)=>{ onComplete(id); const goal=state.profile.clipGoal; const done=(state.session.date===todayStr()?state.session.completedToday:0)+1; if(state.settings.breaks && done>0 && done%goal===0) setNudge(true); };

          return (<div key={id} className="clip" data-id={id} ref={el=>clipRefs.current[id]=el} style={{"--sc":sc(lesson.subject)}}>
            <Clip lesson={lesson} active={activeId===id} state={state} mutateEng={mutateEng} onComplete={handleComplete} flash={flash} setSheet={setSheet} scrollNext={scrollNext} />

  );

/* ---------------- CLIP ---------------- */
const BEAT_MS=5200;
function Clip({lesson, active, state, mutateEng, onComplete, flash, setSheet, scrollNext}){
  const [beat,setBeat]=useState(0);
  const [playing,setPlaying]=useState(false);
  const [prog,setProg]=useState(0);
  const [showQuiz,setShowQuiz]=useState(false);
  const [picked,setPicked]=useState(null);
  const e=state.eng[lesson.id]||blankEng();
  const watchAccum=useRef(0); const enteredOnce=useRef(false); const completedRef=useRef(false);
  const flushWatch=()=>{ if(watchAccum.current>0){ const ms=watchAccum.current; watchAccum.current=0; mutateEng(lesson.id, prev=>({...prev, watchMs:prev.watchMs+ms})); } };
  useEffect(()=>{
    if(active){
      if(!enteredOnce.current){ enteredOnce.current=true; mutateEng(lesson.id, prev=>({...prev, views:prev.views+1, rewatches: prev.views>0?prev.rewatches+1:prev.rewatches})); }
      setBeat(0); setProg(0); setShowQuiz(false); setPicked(null); completedRef.current=false; setPlaying(true);
    } else { flushWatch(); if(enteredOnce.current && !completedRef.current) mutateEng(lesson.id, prev=>({...prev, skipped:prev.skipped+1})); enteredOnce.current=false; setPlaying(false); }
  },[active]);
  useEffect(()=>{ if(!active||!playing||showQuiz) return; const tick=120;
    const t=setInterval(()=>{ watchAccum.current+=tick;
      setProg(p=>{ const np=p+tick/BEAT_MS;
        if(np>=1){ setBeat(b=>{ if(b+1>=lesson.beats.length){ completedRef.current=true; flushWatch(); setShowQuiz(true); setPlaying(false); mutateEng(lesson.id, prev=>({...prev, completed:prev.completed+1})); onComplete(lesson.id); return b; } return b+1; }); return 0; }
        return np; });
    },tick); return ()=>{ clearInterval(t); flushWatch(); };
  },[active,playing,showQuiz,beat]);
  useEffect(()=>{ const t=setInterval(flushWatch,3000); return ()=>clearInterval(t); },[]);
  const liked=e.liked, saved=e.saved;
  const likeCount=lesson.baseLikes+(liked?1:0), saveCount=lesson.baseSaves+(saved?1:0);
  const toggleLike=()=>{ mutateEng(lesson.id, prev=>({...prev, liked:!prev.liked})); if(!liked) flash("Liked — noted as a favourite ❤️"); };
  const toggleSave=()=>{ mutateEng(lesson.id, prev=>({...prev, saved:!prev.saved})); flash(saved?"Removed from Saved":"Saved to your collection 🔖"); };
  const share=()=>{ const txt=`${lesson.title} — ${lesson.note}`; if(navigator.clipboard) navigator.clipboard.writeText(txt).catch(()=>{}); flash("Summary copied 📋"); };
  const answerQuiz=(i)=>{ if(picked!==null) return; setPicked(i); const correct=i===lesson.quiz.answer; mutateEng(lesson.id, prev=>({...prev, quizAttempts:prev.quizAttempts+1, quizCorrect:prev.quizCorrect+(correct?1:0)})); flash(correct?"Correct! ✅":"Not quite — added to your focus areas"); };
  const replay=()=>{ setShowQuiz(false); setPicked(null); setBeat(0); setProg(0); setPlaying(true); };
  return (
    <>
      <div className="bg"></div><div className="orb a"></div><div className="orb b"></div>
      <div className="segs">{lesson.beats.map((_,i)=>(<div key={i} className={"s"+(i<beat?" done":"")}><span style={{width: i<beat?"100%": i===beat?`${prog*100}%`:"0%", transition: state.settings.motion?"width .12s linear":"none"}}></span></div>))}</div>
      <div className="clip-top"><span className="subj" style={{color:sc(lesson.subject)}}>{SUBJECTS[lesson.subject].name}</span><span className="dur">· {lesson.dur}</span></div>
      <div className="stage" onClick={()=>{ if(!showQuiz) setPlaying(p=>!p); }}>
        <div className="hook">{lesson.hook}</div>
        <div className="beats">{lesson.beats.map((b,i)=>(<div key={i} className={"beat"+(i===beat?" on":i<beat?" past":"")}>{b}</div>))}</div>
        {!playing && !showQuiz && active && <div className="paused-pill">▶</div>}
      </div>
      <div className="clip-meta">
        <div className="ttl">{lesson.title}</div>
        <div className="tpc">#{SUBJECTS[lesson.subject].name.replace(/\s/g,"")} · {lesson.topic}</div>
        <div className="chips">
          <button className="chip" onClick={()=>setSheet({type:"transcript", lessonId:lesson.id})}>📄 Transcript</button>
          <button className="chip" onClick={()=>setSheet({type:"note", lessonId:lesson.id})}>💡 Key note</button>
          <button className="chip pulse" onClick={()=>{ setShowQuiz(true); setPlaying(false); }}>✏️ Quiz</button>
        </div>
      </div>
      <div className="rail">
        <div className="badge" style={{background:sc(lesson.subject)}}>{SUBJECTS[lesson.subject].tag}</div>
        <button className="act" onClick={toggleLike}><span className={"ic"+(liked?" on-like":"")}>{liked?"❤️":"🤍"}</span><span className="lbl">{likeCount>999?(likeCount/1000).toFixed(1)+"k":likeCount}</span></button>
        <button className="act" onClick={toggleSave}><span className={"ic"+(saved?" on-save":"")}>{saved?"🔖":"🏷️"}</span><span className="lbl">{saveCount>999?(saveCount/1000).toFixed(1)+"k":saveCount}</span></button>
        <button className="act" onClick={()=>setSheet({type:"comments", lessonId:lesson.id})}><span className="ic">💬</span><span className="lbl">{e.comments.length||"Q&A"}</span></button>
        <button className="act" onClick={share}><span className="ic">↗️</span><span className="lbl">Share</span></button>
      </div>
      {active && !showQuiz && <div className="swipe-hint">swipe up for next ↑</div>}
      {showQuiz && (
        <div className="quiz">
          <div className="qh">Quick check before you swipe</div>
          <div className="qq">{lesson.quiz.q}</div>
          {lesson.quiz.opts.map((o,i)=>{ let cls="opt"; if(picked!==null){ if(i===lesson.quiz.answer) cls+=" correct"; else if(i===picked) cls+=" wrong"; } return <button key={i} className={cls} onClick={()=>answerQuiz(i)}>{o}</button>; })}
          {picked!==null && <div className="exp">{picked===lesson.quiz.answer?"✅ ":"💡 "}{lesson.quiz.exp}</div>}
          <div className="qrow"><button className="btn ghost sm" onClick={replay}>↺ Replay</button><button className="btn cyan sm" style={{flex:1}} onClick={scrollNext}>Next clip ↓</button></div>
        </div>
      )}
    </>
  );
}

              <div className="row"><input type="text" value={txt} onChange={ev=>setTxt(ev.target.value)} placeholder="e.g. why is c the longest side?" onKeyDown={ev=>{ if(ev.key==="Enter") addComment(); }} /><button className="btn sm" onClick={addComment}>Add</button></div>
              {e.comments.length===0 && <div className="empty"><span className="ei">💬</span><p>No notes yet.</p></div>}

            <h3 style={{fontSize:19, margin:"6px 0 4px"}}>{queue.length} clips lined up</h3>
            <p className="muted" style={{fontSize:13.5, margin:"0 0 12px"}}>Prioritising your focus areas, then anything new.</p>
            <button className="btn block" onClick={()=>play(queue,"pathway")}>▶ Play my pathway</button>
          </div>
          {foc.length>0 && (
            <div style={{marginTop:18}}>
              <div className="eyebrow" style={{margin:"0 2px 10px"}}>🎯 Focus areas — needs another look</div>
              <div className="stack">{foc.map(t=>(
                <div key={t.subject+t.topic} className="card">
                  <div className="between"><div><strong style={{fontFamily:"var(--font-display)"}}>{t.topic}</strong><div className="dim" style={{fontSize:12}}>{SUBJECTS[t.subject].name}{t.accuracy!=null?` · ${t.accuracy}% quiz accuracy`:" · not quizzed yet"}</div></div>
                    <button className="btn sm" onClick={()=>play(t.lessons,"pathway",t.lessons[0])}>Review</button></div>
                  <div className="bar" style={{marginTop:10}}><span style={{width:`${Math.round(t.gpAvg*100)}%`, background:"linear-gradient(90deg,var(--gold),var(--bad))"}}></span></div>
                </div>))}</div>
            </div>
          )}
          {str.length>0 && (
            <div style={{marginTop:18}}>
              <div className="eyebrow" style={{margin:"0 2px 10px"}}>💪 Your strengths</div>
              <div className="stack">{str.map(t=>(
                <div key={t.subject+t.topic} className="card between"><div><strong style={{fontFamily:"var(--font-display)"}}>{t.topic}</strong><div className="dim" style={{fontSize:12}}>{SUBJECTS[t.subject].name}{t.accuracy!=null?` · ${t.accuracy}% accuracy`:""}</div></div><span className="pill" style={{color:sc(t.subject)}}>strong</span></div>))}</div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ---------------- YOU ---------------- */
function YouPage({state,setState,flash}){
  let watch=0,attempts=0,correct=0,completed=0;
  LESSONS.forEach(l=>{ const e=state.eng[l.id]||blankEng(); watch+=e.watchMs; attempts+=e.quizAttempts; correct+=e.quizCorrect; completed+=e.completed>0?1:0; });
  const acc=attempts?Math.round(100*correct/attempts):0;
  const set=(k,v)=>setState(s=>({...s, settings:{...s.settings,[k]:v}}));
  const exportData=()=>{ const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"}); const u=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=u; a.download=`scrolllearn-backup-${todayStr()}.json`; a.click(); URL.revokeObjectURL(u); };
  const importData=(ev)=>{ const f=ev.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d&&d.eng){ save(d); location.reload(); } else flash("That file doesn't look right."); }catch(err){ flash("Couldn't read that file."); } }; r.readAsText(f); };
  const pct=Math.round(100*completed/LESSONS.length); const R=52, CIRC=2*Math.PI*R;
  const subjWithLessons=Object.values(SUBJECTS).filter(su=>LESSONS.some(l=>l.subject===su.key));
  return (
    <div className="page">
      <h2>You 📊</h2>
      <p className="sub">{state.profile.name}'s learning, by the numbers.</p>
      <div className="card" style={{display:"flex", alignItems:"center", gap:18}}>
        <div className="donut"><svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r={R} fill="none" stroke="var(--panel-2)" strokeWidth="12"/><circle cx="60" cy="60" r={R} fill="none" stroke="var(--accent)" strokeWidth="12" strokeLinecap="round" strokeDasharray={CIRC} strokeDashoffset={CIRC*(1-pct/100)} transform="rotate(-90 60 60)"/></svg><div className="n">{pct}%</div></div>
        <div><div style={{fontFamily:"var(--font-display)", fontWeight:700, fontSize:20}}>{completed} / {LESSONS.length}</div><div className="muted" style={{fontSize:13}}>lessons completed</div><div className="muted" style={{fontSize:13, marginTop:8}}>{state.session.date===todayStr()?state.session.completedToday:0} done today · goal {state.profile.clipGoal}</div></div>
      </div>
      <div className="row" style={{marginTop:12, gap:12}}>
        <div className="card" style={{flex:1, textAlign:"center"}}><div style={{fontSize:24}}>⏱️</div><div style={{fontFamily:"var(--font-display)",fontWeight:700,fontSize:18}}>{fmtTime(watch)}</div><div className="dim" style={{fontSize:12}}>watch time</div></div>
        <div className="card" style={{flex:1, textAlign:"center"}}><div style={{fontSize:24}}>🎯</div><div style={{fontFamily:"var(--font-display)",fontWeight:700,fontSize:18}}>{acc}%</div><div className="dim" style={{fontSize:12}}>quiz accuracy</div></div>
      </div>
      <div className="card" style={{marginTop:12}}>
        <div className="eyebrow" style={{marginBottom:10}}>Mastery by subject</div>
        <div className="stack">{subjWithLessons.map(su=>{ const ls=LESSONS.filter(l=>l.subject===su.key); const done=ls.filter(l=>(state.eng[l.id]||{}).completed>0).length; const p=ls.length?Math.round(100*done/ls.length):0;
          return (<div key={su.key}><div className="between" style={{marginBottom:5}}><span style={{fontSize:13.5, fontWeight:600}}>{su.name}</span><span className="dim" style={{fontSize:12}}>{done}/{ls.length}</span></div><div className="bar"><span style={{width:`${p}%`, background:sc(su.key)}}></span></div></div>); })}</div>
      </div>
      <div className="card" style={{marginTop:12}}>
        <div className="eyebrow" style={{marginBottom:10}}>Comfort & focus</div>
        <div className="stack">
          <div><div style={{fontSize:13.5, fontWeight:600, marginBottom:6}}>Calm mode (low stimulation)</div><div className="seg-ctl"><button className={!state.settings.calm?"on":""} onClick={()=>set("calm",false)}>Vivid</button><button className={state.settings.calm?"on":""} onClick={()=>set("calm",true)}>Calm</button></div></div>
          <div><div style={{fontSize:13.5, fontWeight:600, marginBottom:6}}>Animations</div><div className="seg-ctl"><button className={state.settings.motion?"on":""} onClick={()=>set("motion",1)}>On</button><button className={!state.settings.motion?"on":""} onClick={()=>set("motion",0)}>Reduced</button></div></div>
          <div><div style={{fontSize:13.5, fontWeight:600, marginBottom:6}}>Reading font</div><div className="seg-ctl"><button className={state.settings.font==="normal"?"on":""} onClick={()=>set("font","normal")}>Standard</button><button className={state.settings.font==="dyslexic"?"on":""} onClick={()=>set("font","dyslexic")}>Hyperlegible</button></div></div>
          <div><div style={{fontSize:13.5, fontWeight:600, marginBottom:6}}>Break reminders</div><div className="seg-ctl"><button className={state.settings.breaks?"on":""} onClick={()=>set("breaks",true)}>On</button><button className={!state.settings.breaks?"on":""} onClick={()=>set("breaks",false)}>Off</button></div></div>
        </div>
      </div>
      <div className="card" style={{marginTop:12}}>
        <div className="eyebrow" style={{marginBottom:10}}>Backup</div>
        <p className="muted" style={{fontSize:13, margin:"0 0 10px"}}>Progress is stored on this device. Export now and then to keep it safe.</p>
        <div className="row"><button className="btn ghost sm" onClick={exportData}>⬇ Export</button><label className="btn ghost sm" style={{cursor:"pointer"}}>⬆ Import<input type="file" accept="application/json" onChange={importData} style={{display:"none"}}/></label></div>
      </div>
      <p className="dim" style={{textAlign:"center", fontSize:11.5, marginTop:14}}>Bella's Brain · JAGS GCSE 2025–2027 · v2</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
  if("serviceWorker" in navigator){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("./sw.js").catch(function(){});
    });
  }
</script>
</body>
